<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Park Near</title>

    <!-- Скрипты загружаются СИНХРОННО -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=75eb2fa2-7ab4-4322-9fa3-d7581badafd2&lang=ru_RU"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            background: #F2F2F7;
        }

        /* Стеклянная плашка ParkNear */
        .app-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.3);
        }
        .app-title { font-size: 22px; font-weight: 700; color: #000; }
        .app-title span { color: #007AFF; font-weight: 800; }

        #map { 
            width: 100%; 
            height: calc(100vh - 60px - 83px);
            position: fixed; 
            top: 60px;
            left: 0; 
        }

        .controls { 
            position: fixed; 
            top: 80px; 
            left: 16px; 
            z-index: 900; 
            display: flex;
            gap: 10px;
        }
        .btn {
            width: 44px; height: 44px; border-radius: 12px; 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: none; font-size: 20px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        #addBtn {
            position: fixed; bottom: 100px; right: 20px; z-index: 900;
            width: 56px; height: 56px; border-radius: 50%; background: #007AFF; color: white;
            border: none; font-size: 28px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,122,255,0.4);
        }
        #addBtn.drawing { background: #FF3B30; }

        .tabBar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 83px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            z-index: 1000; display: flex;
            border-top: 0.5px solid rgba(0,0,0,0.1);
        }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .tab .icon { font-size: 24px; margin-bottom: 4px; }
        .tab .label { font-size: 10px; color: #8E8E93; }
        .tab.active .label { color: #007AFF; font-weight: 600; }

        .panel {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #F2F2F7; z-index: 2000; transform: translateY(100%);
            transition: transform 0.3s; display: flex; flex-direction: column;
        }
        .panel.active { transform: translateY(0); }
        .panel-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        .panel-title { font-size: 24px; font-weight: 700; }
        .panel-close { color: #007AFF; background: none; border: none; font-size: 17px; cursor: pointer; }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; }

        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 20px;
            z-index: 4000; transition: transform 0.3s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .login-btn {
            background: #0088cc; color: white; border: none; padding: 16px 24px;
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            width: 100%; margin: 20px 0;
        }

        .ios-list { background: white; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .ios-list-item { padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid rgba(0,0,0,0.1); cursor: pointer; }
        .list-icon { width: 44px; height: 44px; border-radius: 10px; background: #34C759; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .list-content { flex: 1; }
        .list-title { font-size: 16px; font-weight: 600; }
        .list-subtitle { font-size: 13px; color: #8E8E93; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 3000; display: none; align-items: flex-end; justify-content: center; }
        .modal.active { display: flex; }
        .modal-sheet { background: #F2F2F7; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 85vh; overflow-y: auto; }
        .modal-handle { width: 36px; height: 5px; background: #8E8E93; border-radius: 3px; margin: 0 auto 16px; opacity: 0.5; }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        .modal-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #E5E5EA; font-size: 16px; margin-bottom: 16px; }
        .status-selector { display: flex; gap: 10px; margin: 16px 0; }
        .status-btn { flex: 1; padding: 12px; border: 2px solid transparent; border-radius: 10px; font-weight: 600; cursor: pointer; color: white; }
        .status-btn.free { background: #34C759; }
        .status-btn.busy { background: #FF3B30; }
        .status-btn.unknown { background: #007AFF; }
        .status-btn.selected { border-color: #000; }
        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px; }
        .modal-btn-primary { background: #007AFF; color: white; }
        .modal-btn-secondary { background: #E5E5EA; color: #000; }

        .theme-toggle { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: white; border-radius: 12px; margin-bottom: 16px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 2px; bottom: 2px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: #34C759; }
        input:checked + .slider:before { transform: translateX(20px); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat-card { background: white; border-radius: 12px; padding: 14px 10px; text-align: center; }
        .stat-number { font-size: 24px; font-weight: 700; color: #007AFF; }
        .stat-label { font-size: 11px; color: #8E8E93; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">Park<span>Near</span></div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <button class="btn" onclick="showMyLocation()">📍</button>
    </div>

    <button id="addBtn">+</button>

    <div class="panel" id="panel">
        <div class="panel-header">
            <div class="panel-title" id="panelTitle">Профиль</div>
            <button class="panel-close" onclick="closePanel()">Готово</button>
        </div>
        <div class="panel-content" id="panelContent"></div>
    </div>

    <div class="tabBar">
        <div class="tab active" onclick="showMap()"><div class="icon">️</div><div class="label">Карта</div></div>
        <div class="tab" onclick="showPanel('history')"><div class="icon">🕘</div><div class="label">История</div></div>
        <div class="tab" onclick="showPanel('favorites')"><div class="icon">⭐</div><div class="label">Избранное</div></div>
        <div class="tab" onclick="showPanel('profile')"><div class="icon">👤</div><div class="label">Профиль</div></div>
    </div>

    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyATLX5t2lmibbuiSXL_sWu_JnFFTb-nMqU",
            authDomain: "parknear-bef41.firebaseapp.com",
            databaseURL: "https://parknear-bef41-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "parknear-bef41",
            storageBucket: "parknear-bef41.firebasestorage.app",
            messagingSenderId: "1066552333578",
            appId: "1:1066552333578:web:e60e333cf877852eba16f3"
        };

        // Инициализируем Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map = null;
        let currentUser = null;
        let parkingsData = {};
        let myHomes = [];
        let drawing = false;
        let editingParkingId = null;
        let points = [];
        let tempPolygon = null;
        let streetCounters = {};

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // Инициализация карты
        function initMap() {
            map = new ymaps.Map("map", {
                center: [55.7558, 37.6173],
                zoom: 10,
                controls: ['zoomControl']
            });

            // Геолокация
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const coords = [pos.coords.latitude, pos.coords.longitude];
                    map.setCenter(coords, 14);
                    map.geoObjects.add(new ymaps.Placemark(coords, {
                        hintContent: 'Вы здесь'
                    }, {
                        preset: 'islands#blueCircleIcon'
                    }));
                }, () => {});
            }

            // Клик по карте
            map.events.add("click", e => {
                if (drawing || editingParkingId) {
                    points.push(e.get("coords"));
                    if (tempPolygon) map.geoObjects.remove(tempPolygon);
                    tempPolygon = new ymaps.Polygon([points], {}, {
                        fillColor: "#007AFF",
                        fillOpacity: 0.3,
                        strokeColor: "#007AFF",
                        strokeWidth: 3
                    });
                    map.geoObjects.add(tempPolygon);
                }
            });

            // Кнопка добавления
            document.getElementById("addBtn").onclick = function() {
                if (!currentUser) {
                    showToast('Сначала войдите');
                    showPanel('profile');
                    return;
                }
                if (editingParkingId) {
                    finishEditingShape();
                    return;
                }
                if (drawing) {
                    finishDrawing();
                    return;
                }
                drawing = true;
                points = [];
                this.classList.add('drawing');
                this.textContent = '✕';
                showToast('Нажмите на карту');
            };

            // Загружаем пользователя
            const saved = localStorage.getItem('tgUser');
            if (saved) currentUser = JSON.parse(saved);

            // Загружаем парковки
            loadParkings();
            loadHomes();
        }

        // Ждем когда Яндекс Карты загрузятся
        if (typeof ymaps !== 'undefined') {
            ymaps.ready(initMap);
        } else {
            window.addEventListener('load', () => {
                if (typeof ymaps !== 'undefined') {
                    ymaps.ready(initMap);
                } else {
                    showToast('Ошибка загрузки карты');
                }
            });
        }

        function finishDrawing() {
            drawing = false;
            const btn = document.getElementById("addBtn");
            btn.classList.remove('drawing');
            btn.textContent = '+';

            if (points.length < 3) {
                showToast('Минимум 3 точки');
                if (tempPolygon) map.geoObjects.remove(tempPolygon);
                return;
            }

            const name = prompt("Название:") || "Парковка";
            const places = prompt("Количество мест:") || "0";

            const parking = {
                name: name,
                places: Number(places),
                coordinates: points,
                owner: currentUser.id,
                ownerName: currentUser.firstName,
                created: new Date().toISOString(),
                status: 'unknown'
            };

            const id = database.ref("parkings").push().key;
            database.ref("parkings/" + id).set(parking).then(() => {
                showToast('Сохранено!');
                if (tempPolygon) map.geoObjects.remove(tempPolygon);
                loadParkings();
            });
        }

        function startEditingShape(id) {
            editingParkingId = id;
            const p = parkingsData[id];
            points = [...p.coordinates];
            loadParkings();
            if (tempPolygon) map.geoObjects.remove(tempPolygon);
            tempPolygon = new ymaps.Polygon([points], {}, {
                fillColor: "#007AFF",
                fillOpacity: 0.3,
                strokeColor: "#007AFF",
                strokeWidth: 3
            });
            map.geoObjects.add(tempPolygon);

            const btn = document.getElementById("addBtn");
            btn.classList.add('drawing');
            btn.textContent = '💾';
            closeModal();
            showToast('Кликайте для новой фигуры');
        }

        function finishEditingShape() {
            if (!editingParkingId) return;
            if (points.length < 3) {
                showToast('Минимум 3 точки');
                cancelEditing();
                return;
            }

            database.ref("parkings/" + editingParkingId).update({
                coordinates: points
            }).then(() => {
                showToast('Обновлено!');
                cancelEditing();
            });
        }

        function cancelEditing() {
            editingParkingId = null;
            if (tempPolygon) map.geoObjects.remove(tempPolygon);
            loadParkings();
            const btn = document.getElementById("addBtn");
            btn.classList.remove('drawing');
            btn.textContent = '+';
        }

        function loadParkings() {
            database.ref("parkings").on("value", snap => {
                const data = snap.val();
                if (data) {
                    parkingsData = data;
                    map.geoObjects.removeAll();
                    Object.keys(data).forEach(id => {
                        const p = data[id];
                        const color = p.status === 'free' ? '#34C759' : p.status === 'busy' ? '#FF3B30' : '#007AFF';
                        const poly = new ymaps.Polygon([p.coordinates], {
                            hintContent: p.name
                        }, {
                            fillColor: color,
                            fillOpacity: 0.4,
                            strokeColor: color,
                            strokeWidth: 3
                        });
                        poly.events.add('click', () => showParkingModal(id, p));
                        map.geoObjects.add(poly);
                    });
                }
            });
        }

        function showParkingModal(id, p) {
            if (editingParkingId && editingParkingId !== id) {
                showToast('Завершите редактирование');
                return;
            }
            document.getElementById('modalBody').innerHTML = '<div class="modal-title">🅿️ ' + p.name + '</div>' +
                '<input type="number" class="modal-input" id="editPlaces" value="' + p.places + '" placeholder="Мест">' +
                '<div class="status-selector">' +
                    '<button class="status-btn free ' + (p.status === 'free' ? 'selected' : '') + '" onclick="updateField(\'' + id + '\',\'status\',\'free\')">✅ Свободно</button>' +
                    '<button class="status-btn busy ' + (p.status === 'busy' ? 'selected' : '') + '" onclick="updateField(\'' + id + '\',\'status\',\'busy\')">❌ Занято</button>' +
                    '<button class="status-btn unknown ' + (p.status === 'unknown' ? 'selected' : '') + '" onclick="updateField(\'' + id + '\',\'status\',\'unknown\')"> Неизв.</button>' +
                '</div>' +
                '<div class="modal-actions">' +
                    '<button class="modal-btn modal-btn-secondary" onclick="startEditingShape(\'' + id + '\')">📝 Фигуру</button>' +
                    '<button class="modal-btn modal-btn-primary" onclick="updateField(\'' + id + '\',\'places\',Number(document.getElementById(\'editPlaces\').value))">💾 Сохранить</button>' +
                '</div>' +
                '<div class="modal-actions">' +
                    '<button class="modal-btn modal-btn-secondary" onclick="closeModal()">Закрыть</button>' +
                '</div>';
            document.getElementById('modal').classList.add('active');
        }

        function updateField(id, field, val) {
            database.ref("parkings/" + id + "/" + field).set(val).then(() => {
                showToast('Обновлено');
                loadParkings();
                closeModal();
            });
        }

        function closeModal(e) {
            if (!e || e.target.id === 'modal') {
                document.getElementById('modal').classList.remove('active');
                if (editingParkingId) cancelEditing();
            }
        }

        function showMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const coords = [pos.coords.latitude, pos.coords.longitude];
                    if (map) {
                        map.setCenter(coords, 14);
                        map.geoObjects.add(new ymaps.Placemark(coords, {
                            hintContent: 'Вы здесь'
                        }, {
                            preset: 'islands#blueCircleIcon'
                        }));
                        showToast('📍 Ваше место');
                    }
                }, () => showToast('❌ Нет GPS'));
            }
        }

        function showPanel(type) {
            document.getElementById('panel').classList.add('active');
            document.getElementById('panelTitle').textContent = type === 'history' ? 'История' : type === 'favorites' ? 'Избранное' : 'Профиль';

            const content = document.getElementById('panelContent');

            if (type === 'profile') {
                if (!currentUser) {
                    content.innerHTML = '<div style="text-align:center; padding:40px 20px;">' +
                        '<div style="font-size:60px; margin-bottom:20px;"></div>' +
                        '<div style="font-size:18px; font-weight:600; margin-bottom:20px;">Вход через Telegram</div>' +
                        '<button class="login-btn" onclick="loginWithTelegram()">Войти через Telegram</button>' +
                    '</div>';
                } else {
                    const myP = Object.values(parkingsData).filter(p => p.owner === currentUser.id);
                    const free = myP.filter(p => p.status === 'free').length;
                    const busy = myP.filter(p => p.status === 'busy').length;

                    content.innerHTML = '<div style="text-align:center; padding:20px;">' +
                        '<div style="font-size:18px; font-weight:700;">' + currentUser.firstName + '</div>' +
                        '<div style="color:#8E8E93;">@' + currentUser.username + '</div>' +
                    '</div>' +
                    '<div class="theme-toggle">' +
                        '<span> Темная тема</span>' +
                        '<label class="switch"><input type="checkbox" onchange="toggleTheme()"><span class="slider"></span></label>' +
                    '</div>' +
                    '<div class="stats-grid">' +
                        '<div class="stat-card"><div class="stat-number">' + myP.length + '</div><div class="stat-label">Парковок</div></div>' +
                        '<div class="stat-card"><div class="stat-number">' + free + '</div><div class="stat-label">Свободно</div></div>' +
                        '<div class="stat-card"><div class="stat-number">' + busy + '</div><div class="stat-label">Занято</div></div>' +
                    '</div>' +
                    '<button onclick="logout()" style="width:100%; padding:14px; background:transparent; color:#FF3B30; border:1px solid #FF3B30; border-radius:12px; font-weight:600; cursor:pointer;">🚪 Выйти</button>';
                }
            } else if (type === 'history') {
                if (!currentUser) {
                    content.innerHTML = '<div style="text-align:center; padding:40px; color:#8E8E93;">Войдите</div>';
                } else {
                    const list = Object.keys(parkingsData)
                        .filter(id => parkingsData[id].owner === currentUser.id)
                        .map(id => parkingsData[id]);

                    if (list.length === 0) {
                        content.innerHTML = '<div style="text-align:center; padding:40px; color:#8E8E93;">Пусто</div>';
                    } else {
                        content.innerHTML = '<div class="ios-list">' + list.map(p =>
                            '<div class="ios-list-item">' +
                                '<div class="list-icon" style="background:' + (p.status === 'free' ? '#34C759' : p.status === 'busy' ? '#FF3B30' : '#007AFF') + '"></div>' +
                                '<div class="list-content">' +
                                    '<div class="list-title">' + p.name + '</div>' +
                                    '<div class="list-subtitle">Мест: ' + p.places + '</div>' +
                                '</div>' +
                            '</div>'
                        ).join('') + '</div>';
                    }
                }
            } else {
                if (!myHomes.length) {
                    content.innerHTML = '<div style="text-align:center; padding:40px; color:#8E8E93;">🏠 Нет домов</div>';
                } else {
                    content.innerHTML = '<div class="ios-list">' + myHomes.map(h =>
                        '<div class="ios-list-item">' +
                            '<div class="list-icon" style="background:#FF9500;"></div>' +
                            '<div class="list-content">' +
                                '<div class="list-title">' + h.address + '</div>' +
                            '</div>' +
                        '</div>'
                    ).join('') + '</div>';
                }
            }
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('active');
        }

        function showMap() {
            closePanel();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.tab:first-child').classList.add('active');
        }

        function loginWithTelegram() {
            const username = prompt('Введите ваш Telegram username (без @):');
            if (username && username.trim()) {
                const firstName = prompt('Ваше имя:') || 'Пользователь';
                currentUser = {
                    id: 'tg_' + Date.now(),
                    username: username.replace('@', ''),
                    firstName: firstName
                };
                database.ref('users/' + currentUser.id).set(currentUser);
                localStorage.setItem('tgUser', JSON.stringify(currentUser));
                showToast('Добро пожаловать, ' + firstName + '!');
                showPanel('profile');
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('tgUser');
            showToast('Вы вышли');
            showPanel('profile');
        }

        function loadHomes() {
            if (!currentUser) return;
            database.ref('homes/' + currentUser.id).on("value", snap => {
                const d = snap.val();
                myHomes = d ? Object.values(d) : [];
            });
        }

        function toggleTheme() {
            document.body.style.background = document.body.style.background === 'rgb(0, 0, 0)' ? '#F2F2F7' : '#000';
            document.body.style.color = document.body.style.color === 'rgb(255, 255, 255)' ? '#000' : '#fff';
        }
    </script>
</body>
</html>
