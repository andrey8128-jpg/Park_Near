<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Park Near</title>
    
    <!-- Telegram Web App Script (для автоматического получения данных) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://api-maps.yandex.ru/2.1/?apikey=75eb2fa2-7ab4-4322-9fa3-d7581badafd2&lang=ru_RU"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #F2F2F7;
            --text-color: #000000;
            --card-bg: #FFFFFF;
            --secondary-text: #8E8E93;
            --input-bg: #E5E5EA;
            --border-color: rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --card-bg: #1C1C1E;
            --secondary-text: #98989D;
            --input-bg: #2C2C2E;
            --border-color: rgba(255,255,255,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            overflow: hidden; 
            height: 100vh; 
            height: 100dvh; 
        }

        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
            padding-top: env(safe-area-inset-top);
        }
        [data-theme="dark"] .app-header {
            background: rgba(28, 28, 30, 0.9);
            border-bottom-color: rgba(255,255,255,0.1);
        }
        .app-title { font-size: 17px; font-weight: 600; color: var(--text-color); }
        .app-title span { color: #007AFF; }

        #map { 
            width: 100%; 
            height: calc(100vh - 50px - 83px);
            position: fixed; 
            top: 50px;
            left: 0; 
            z-index: 1;
        }
        
        #map .ymaps-2-1-79-copyright,
        #map .ymaps-2-1-79-logo,
        #map .ymaps-copyright,
        #map .ymaps-logo {
            z-index: 100 !important;
            opacity: 1 !important;
        }

        .floating-controls { 
            position: fixed; 
            top: 110px; 
            left: 16px; 
            z-index: 900; 
            display: flex;
            gap: 10px;
        }
        .control-btn { 
            width: 44px; height: 44px; border-radius: 12px; background: white; 
            border: none; font-size: 20px; cursor: pointer; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; 
        }
        .control-btn:active { transform: scale(0.95); }

        .map-type-menu { 
            position: absolute; top: 50px; left: 0; background: white; 
            border-radius: 12px; padding: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); min-width: 180px; display: none; 
        }
        .map-type-menu.show { display: block; }
        .map-type-option { padding: 12px 16px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 500; }
        .map-type-option.active { background: #007AFF; color: white; }

        #addBtn { 
            position: fixed; bottom: 100px; right: 20px; z-index: 900; 
            width: 56px; height: 56px; border-radius: 50%; background: #007AFF; color: white; 
            border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 12px rgba(0,122,255,0.4); 
            display: flex; align-items: center; justify-content: center; 
        }
        #addBtn.drawing { background: #FF3B30; }

        #tabBar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 83px; 
            background: var(--card-bg); z-index: 1000; display: flex; 
            border-top: 0.5px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); 
        }
        .tabItem { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .tabItem .tab-icon { font-size: 24px; margin-bottom: 4px; }
        .tabItem .tab-label { font-size: 10px; color: var(--secondary-text); font-weight: 500; }
        .tabItem.active .tab-label { color: #007AFF; font-weight: 600; }

        #fullScreenPanel { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: var(--bg-color); z-index: 2000; transform: translateY(100%); 
            transition: transform 0.3s; display: flex; flex-direction: column; 
        }
        #fullScreenPanel.active { transform: translateY(0); }
        .panel-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border-color); background: var(--bg-color); }
        .panel-title { font-size: 30px; font-weight: 700; }
        .close-panel-btn { color: #007AFF; font-size: 17px; background: none; border: none; cursor: pointer; font-weight: 500; }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px 0; }

        .ios-list { background: var(--card-bg); border-radius: 12px; margin: 0 16px 12px; overflow: hidden; }
        .ios-list-item { padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid var(--border-color); cursor: pointer; }
        .list-icon { width: 44px; height: 44px; border-radius: 10px; background: #34C759; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .list-content { flex: 1; }
        .list-title { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
        .list-subtitle { font-size: 13px; color: var(--secondary-text); }
        .status-free { background: #34C759 !important; }
        .status-busy { background: #FF3B30 !important; }
        .status-unknown { background: #007AFF !important; }

        #modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 3000; display: none; align-items: flex-end; justify-content: center; }
        #modal.active { display: flex; }
        .modal-sheet { background: var(--bg-color); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .modal-handle { width: 36px; height: 5px; background: var(--secondary-text); border-radius: 3px; margin: 0 auto 16px; opacity: 0.5; }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        .modal-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--input-bg); color: var(--text-color); font-size: 16px; margin-bottom: 16px; }
        .status-selector { display: flex; gap: 10px; margin: 16px 0; }
        .status-btn { flex: 1; padding: 12px; border: 2px solid transparent; border-radius: 10px; font-weight: 600; cursor: pointer; color: white; }
        .status-btn.free { background: #34C759; }
        .status-btn.busy { background: #FF3B30; }
        .status-btn.unknown { background: #007AFF; }
        .status-btn.selected { border-color: var(--text-color); }
        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px; }
        .modal-btn-primary { background: #007AFF; color: white; }
        .modal-btn-secondary { background: var(--input-bg); color: var(--text-color); }

        .theme-toggle-container { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--card-bg); border-radius: 12px; margin: 0 16px 16px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #34C759; }
        input:checked + .slider:before { transform: translateX(20px); }

        .tg-login-button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 90%;
            max-width: 300px;
            margin: 15px auto;
        }

        .telegram-widget-wrapper {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin: 0 16px 16px;
            text-align: center;
        }
        #telegram-widget-direct {
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #toast { 
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 20px; 
            z-index: 4000; transition: transform 0.3s; 
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px; margin-bottom: 16px; }
        .stat-card { background: var(--card-bg); border-radius: 12px; padding: 14px 10px; text-align: center; }
        .stat-number { font-size: 24px; font-weight: 700; color: #007AFF; }
        .stat-label { font-size: 11px; color: var(--secondary-text); margin-top: 4px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--secondary-text); }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">Park<span>Near</span></div>
    </div>

    <div id="map"></div>

    <div class="floating-controls">
        <button class="control-btn" onclick="showMyLocation()">📍</button>
        <div style="position:relative;">
            <button class="control-btn" onclick="toggleMapTypeMenu()">🗺️</button>
            <div class="map-type-menu" id="mapTypeMenu">
                <div class="map-type-option active" data-type="map" onclick="setMapType('map')">Схема</div>
                <div class="map-type-option" data-type="satellite" onclick="setMapType('satellite')">Спутник</div>
                <div class="map-type-option" data-type="hybrid" onclick="setMapType('hybrid')">Гибрид</div>
            </div>
        </div>
    </div>

    <button id="addBtn">+</button>

    <div id="fullScreenPanel">
        <div class="panel-header">
            <div class="panel-title" id="panelTitle">Профиль</div>
            <button class="close-panel-btn" onclick="switchToMap()">Готово</button>
        </div>
        <div class="panel-content" id="panelContent"></div>
    </div>

    <div id="tabBar">
        <div class="tabItem active" onclick="switchToMap()"><div class="tab-icon">🗺️</div><div class="tab-label">Карта</div></div>
        <div class="tabItem" onclick="openList('history')"><div class="tab-icon">🕘</div><div class="tab-label">История</div></div>
        <div class="tabItem" onclick="openList('favorites')"><div class="tab-icon">⭐</div><div class="tab-label">Избранное</div></div>
        <div class="tabItem" onclick="openList('profile')"><div class="tab-icon">👤</div><div class="tab-label">Профиль</div></div>
    </div>

    <div id="modal" onclick="closeModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const TELEGRAM_BOT_NAME = 'parknear_bot';
        
        const firebaseConfig = {
            apiKey: "AIzaSyATLX5t2lmibbuiSXL_sWu_JnFFTb-nMqU",
            authDomain: "parknear-bef41.firebaseapp.com",
            databaseURL: "https://parknear-bef41-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "parknear-bef41",
            storageBucket: "parknear-bef41.firebasestorage.app",
            messagingSenderId: "1066552333578",
            appId: "1:1066552333578:web:e60e333cf877852eba16f3"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map = null;
        let currentUser = null;
        let parkingsData = {};
        let myHomes = [];
        let drawing = false;
        let editingParkingId = null;
        let points = [];
        let tempPolygon = null;
        let streetCounters = {};
        let currentTheme = 'light';

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function getInitials(name) { 
            return name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); 
        }
        
        function getStatusColor(s) { 
            return s==='free'?'#34C759':s==='busy'?'#FF3B30':'#007AFF'; 
        }
        
        function getStatusText(s) { 
            return s==='free'?'✅ Свободно':s==='busy'?'❌ Занято':'❓ Неизвестно'; 
        }

        // ============================
        // АВТОМАТИЧЕСКАЯ АВТОРИЗАЦИЯ ЧЕРЕЗ TELEGRAM MINI APP
        // ============================
        function initTelegramAuth() {
            if (window.Telegram && Telegram.WebApp) {
                const tg = Telegram.WebApp;
                tg.ready();
                tg.expand(); // Разворачиваем на весь экран
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    currentUser = {
                        id: 'tg_' + user.id,
                        telegramId: user.id,
                        username: user.username || 'user' + user.id,
                        firstName: user.first_name,
                        lastName: user.last_name || '',
                        photoUrl: user.photo_url || '',
                        authDate: new Date().toISOString()
                    };
                    
                    localStorage.setItem('tgUser', JSON.stringify(currentUser));
                    database.ref('users/' + currentUser.id).set(currentUser);
                    
                    showToast(`Добро пожаловать, ${currentUser.firstName}! 👋`);
                    return true;
                }
            }
            return false;
        }

        // Виджет для браузера (если домен привязан)
        function loadTelegramWidget() {
            const container = document.getElementById('telegram-widget-direct');
            if (!container) return;
            container.innerHTML = '<div style="color:var(--secondary-text);font-size:13px;">Загрузка...</div>';
            
            setTimeout(() => {
                container.innerHTML = '';
                const widgetDiv = document.createElement('div');
                widgetDiv.setAttribute('data-telegram-login', TELEGRAM_BOT_NAME);
                widgetDiv.setAttribute('data-size', 'large');
                widgetDiv.setAttribute('data-radius', '10');
                widgetDiv.setAttribute('data-onauth', 'onTelegramAuthConfirmed');
                widgetDiv.setAttribute('data-request-access', 'write');
                container.appendChild(widgetDiv);
                
                const script = document.createElement('script');
                script.src = 'https://telegram.org/js/telegram-widget.js?22';
                script.async = true;
                container.appendChild(script);
            }, 100);
        }

        function onTelegramAuthConfirmed(user) {
            currentUser = {
                id: 'tg_' + user.id,
                username: user.username || 'user' + user.id,
                firstName: user.first_name,
                lastName: user.last_name || '',
                photoUrl: user.photo_url || '',
                authDate: new Date().toISOString()
            };
            database.ref('users/' + currentUser.id).set(currentUser)
                .then(() => {
                    localStorage.setItem('tgUser', JSON.stringify(currentUser));
                    showToast(`Добро пожаловать, ${currentUser.firstName}! 👋`);
                    openList('profile');
                });
        }

        // Резервный вход через prompt
        function loginWithTelegram() {
            const tgDeepLink = `tg://resolve?domain=${TELEGRAM_BOT_NAME}&start=login`;
            window.location.href = tgDeepLink;
            
            setTimeout(() => {
                const username = prompt('Введите ваш username (без @):');
                if(username && username.trim()) {
                    const firstName = prompt('Ваше имя:') || 'Пользователь';
                    currentUser = {
                        id: 'tg_' + Date.now(),
                        username: username.replace('@', ''),
                        firstName: firstName,
                        authDate: new Date().toISOString()
                    };
                    database.ref('users/' + currentUser.id).set(currentUser)
                        .then(() => {
                            localStorage.setItem('tgUser', JSON.stringify(currentUser));
                            showToast(`Добро пожаловать, ${firstName}!`);
                            openList('profile');
                        });
                }
            }, 1500);
        }

        function logout() {
            currentUser = null; 
            localStorage.removeItem('tgUser');
            showToast('Вы вышли'); 
            switchToMap();
        }

        // ============================
        // КАРТА
        // ============================
        function initMap() {
            try {
                map = new ymaps.Map("map", { 
                    center: [55.7558, 37.6173], 
                    zoom: 10,
                    controls: ['zoomControl', 'geolocationControl'],
                    margin: [10, 10, 50, 10]
                });
                
                if(navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        const coords = [pos.coords.latitude, pos.coords.longitude];
                        map.setCenter(coords, 14);
                        map.geoObjects.add(new ymaps.Placemark(coords, {
                            hintContent: 'Вы здесь'
                        }, {
                            preset: 'islands#blueCircleIcon'
                        }));
                    }, ()=>{});
                }

                map.events.add("click", e => {
                    if(drawing || editingParkingId) {
                        points.push(e.get("coords"));
                        drawTempPolygon();
                    }
                });

                document.getElementById("addBtn").onclick = async function() {
                    if(!currentUser) { 
                        showToast('Сначала войдите'); 
                        openList('profile'); 
                        return; 
                    }
                    if(editingParkingId) { 
                        finishEditingShape(); 
                        return; 
                    }
                    if(drawing) { 
                        finishDrawingNew(); 
                        return; 
                    }
                    
                    drawing = true; 
                    points = [];
                    this.classList.add('drawing'); 
                    this.textContent = '✕';
                    showToast('Нажмите на карту для точек');
                };

                loadParkings();
                loadHomes();
                
            } catch(e) {
                console.error('Ошибка карты:', e);
                showToast('Ошибка загрузки карты');
            }
        }

        if (window.ymaps) {
            ymaps.ready(initMap);
        } else {
            window.addEventListener('load', () => {
                if(window.ymaps) ymaps.ready(initMap);
            });
        }

        // ============================
        // ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ
        // ============================
        window.addEventListener('load', () => {
            // 1. Пробуем Mini App (автоматический вход)
            if (initTelegramAuth()) {
                console.log('Вход через Telegram Mini App');
                return;
            }
            
            // 2. Пробуем загрузить сохраненного пользователя
            const saved = localStorage.getItem('tgUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                console.log('Восстановлен пользователь из localStorage');
            }
            
            // 3. Загружаем тему
            const savedTheme = localStorage.getItem('appTheme');
            if(savedTheme) {
                currentTheme = savedTheme;
                document.documentElement.setAttribute('data-theme', currentTheme);
            }
        });

        function drawTempPolygon() {
            if(tempPolygon) map.geoObjects.remove(tempPolygon);
            tempPolygon = new ymaps.Polygon([points], {}, { 
                fillColor: "#007AFF", fillOpacity: 0.3, strokeColor: "#007AFF", strokeWidth: 3 
            });
            map.geoObjects.add(tempPolygon);
        }

        async function finishDrawingNew() {
            drawing = false; 
            resetAddBtn();
            if(points.length < 3) { 
                showToast('Минимум 3 точки'); 
                if(tempPolygon) map.geoObjects.remove(tempPolygon); 
                return; 
            }
            
            const center = points.reduce((a,p)=>[a[0]+p[0], a[1]+p[1]], [0,0]).map(c=>c/points.length);
            let autoName = "Парковка";
            
            try {
                const res = await ymaps.geocode(center, {results:1});
                const addr = res.geoObjects.get(0).getAddressLine().split(',');
                const st = addr[1]?.trim()||'Улица'; 
                const hs = addr[2]?.trim()||'';
                const key = st.replace(/\s/g,'').toLowerCase();
                if(!streetCounters[key]) streetCounters[key]=0;
                streetCounters[key]++;
                autoName = `${String.fromCharCode(97+streetCounters[key]-1)}${streetCounters[key]} ${st} ${hs}`.trim();
            } catch(e){}
            
            const name = prompt("Название:", autoName) || autoName;
            const places = prompt("Количество мест:") || "0";
            
            const parking = { 
                name, 
                places: Number(places), 
                coordinates: points, 
                owner: currentUser.id, 
                ownerName: currentUser.firstName, 
                ownerUsername: currentUser.username, 
                created: new Date().toISOString(), 
                center, 
                status: 'unknown' 
            };
            
            const id = database.ref("parkings").push().key;
            database.ref("parkings/"+id).set(parking).then(() => {
                showToast('Сохранено!'); 
                if(tempPolygon) map.geoObjects.remove(tempPolygon); 
                loadParkings();
            });
        }

        function startEditingShape(id) {
            editingParkingId = id;
            const p = parkingsData[id];
            points = [...p.coordinates];
            loadParkings();
            if(tempPolygon) map.geoObjects.remove(tempPolygon);
            drawTempPolygon();
            
            const btn = document.getElementById("addBtn");
            btn.classList.add('drawing'); 
            btn.textContent = '💾';
            closeModal();
            showToast('Кликайте для новой фигуры. Нажмите 💾');
        }

        function finishEditingShape() {
            if(!editingParkingId) return;
            if(points.length < 3) { 
                showToast('Минимум 3 точки'); 
                cancelEditing(); 
                return; 
            }
            
            const center = points.reduce((a,p)=>[a[0]+p[0], a[1]+p[1]], [0,0]).map(c=>c/points.length);
            database.ref("parkings/"+editingParkingId).update({ 
                coordinates: points, 
                center 
            }).then(() => {
                showToast('Фигура обновлена!'); 
                cancelEditing();
            });
        }

        function cancelEditing() {
            editingParkingId = null;
            if(tempPolygon) map.geoObjects.remove(tempPolygon);
            loadParkings(); 
            resetAddBtn();
        }

        function resetAddBtn() { 
            const b = document.getElementById("addBtn"); 
            b.classList.remove('drawing'); 
            b.textContent = '+'; 
        }

        function showMyLocation() {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => { 
                    const coords = [pos.coords.latitude, pos.coords.longitude];
                    if(map) {
                        map.setCenter(coords, 14);
                        map.geoObjects.add(new ymaps.Placemark(coords, {
                            hintContent: 'Вы здесь'
                        }, {
                            preset: 'islands#blueCircleIcon'
                        }));
                        showToast('📍 Ваше местоположение');
                    }
                }, () => showToast('❌ Нет GPS'));
            }
        }

        function toggleMapTypeMenu() { 
            document.getElementById('mapTypeMenu').classList.toggle('show'); 
        }
        
        function setMapType(type) {
            document.querySelectorAll('.map-type-option').forEach(o => o.classList.toggle('active', o.dataset.type===type));
            if(type==='map') map.setType('yandex#map');
            else if(type==='satellite') map.setType('yandex#satellite');
            else map.setType('yandex#hybrid');
            document.getElementById('mapTypeMenu').classList.remove('show');
        }

        function loadParkings() {
            database.ref("parkings").on("value", snap => {
                const data = snap.val();
                if(data) {
                    parkingsData = data;
                    map.geoObjects.removeAll();
                    Object.keys(data).forEach(id => {
                        const p = data[id];
                        const poly = new ymaps.Polygon([p.coordinates], {
                            hintContent: p.name, 
                            balloonContent: `<b>${p.name}</b><br>${getStatusText(p.status)}<br>Мест: ${p.places}`
                        }, {
                            fillColor: getStatusColor(p.status), 
                            fillOpacity: 0.4, 
                            strokeColor: getStatusColor(p.status), 
                            strokeWidth: 3
                        });
                        poly.events.add('click', () => showParkingModal(id, p));
                        map.geoObjects.add(poly);
                    });
                }
            });
        }

        function showParkingModal(id, p) {
            if(editingParkingId && editingParkingId !== id) { 
                showToast('Завершите редактирование'); 
                return; 
            }
            document.getElementById('modalBody').innerHTML = `
                <div class="modal-title">️ ${p.name}</div>
                <input type="number" class="modal-input" id="editPlaces" value="${p.places}" placeholder="Количество мест">
                <div class="status-selector">
                    <button class="status-btn free ${p.status==='free'?'selected':''}" onclick="updateField('${id}','status','free')">✅ Свободно</button>
                    <button class="status-btn busy ${p.status==='busy'?'selected':''}" onclick="updateField('${id}','status','busy')">❌ Занято</button>
                    <button class="status-btn unknown ${p.status==='unknown'?'selected':''}" onclick="updateField('${id}','status','unknown')">❓ Неизв.</button>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn modal-btn-secondary" onclick="startEditingShape('${id}')">📝 Изменить фигуру</button>
                    <button class="modal-btn modal-btn-primary" onclick="updateField('${id}','places', Number(document.getElementById('editPlaces').value))">💾 Сохранить</button>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Закрыть</button>
                    <button class="modal-btn modal-btn-primary" onclick="markHome('${JSON.stringify(p.center)}', '${p.name}')"> Мой дом</button>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function updateField(id, field, val) {
            database.ref("parkings/"+id+"/"+field).set(val).then(() => { 
                showToast('Обновлено'); 
                loadParkings(); 
                closeModal(); 
            });
        }

        function markHome(coordsStr, name) {
            if(!currentUser) return;
            try {
                const coords = JSON.parse(coordsStr);
                database.ref(`homes/${currentUser.id}/${Date.now()}`).set({
                    coords, 
                    address: name, 
                    created: new Date().toISOString()
                }).then(() => { 
                    showToast(' Добавлено'); 
                    loadHomes(); 
                    closeModal(); 
                });
            } catch(e){}
        }

        function closeModal(e) { 
            if(!e || e.target.id==='modal') { 
                document.getElementById('modal').classList.remove('active'); 
                if(editingParkingId) cancelEditing(); 
            } 
        }

        function loadHomes() {
            if(!currentUser) return;
            database.ref(`homes/${currentUser.id}`).on("value", snap => {
                const d = snap.val(); 
                myHomes = d ? Object.values(d) : [];
            });
        }

        function countNear(coords) { 
            let c = 0; 
            Object.values(parkingsData).forEach(p => { 
                if(p.center) {
                    const dist = Math.sqrt(Math.pow(p.center[0]-coords[0],2)+Math.pow(p.center[1]-coords[1],2));
                    if(dist < 0.005) c++;
                }
            }); 
            return c; 
        }

        function switchToMap() {
            document.getElementById('fullScreenPanel').classList.remove('active');
            document.querySelectorAll('.tabItem').forEach(i => i.classList.remove('active'));
            document.querySelector('.tabItem:first-child').classList.add('active');
        }

        function openList(type) {
            document.querySelectorAll('.tabItem').forEach(i => i.classList.remove('active'));
            const tabs = ['map', 'history', 'favorites', 'profile'];
            const idx = tabs.indexOf(type);
            if(idx > -1) document.querySelectorAll('.tabItem')[idx].classList.add('active');
            
            document.getElementById('fullScreenPanel').classList.add('active');
            document.getElementById('panelTitle').textContent = type === 'history' ? 'История' : type === 'favorites' ? 'Избранное' : 'Профиль';
            
            const content = document.getElementById('panelContent');
            
            if(type === 'profile') {
                if (!currentUser) {
                    content.innerHTML = `
                        <div style="text-align:center; padding: 40px 20px;">
                            <div style="font-size: 60px; margin-bottom: 20px;">👤</div>
                            <div style="font-size: 18px; font-weight: 600; margin-bottom: 20px;">Вход через Telegram</div>
                            <button class="tg-login-button" onclick="loginWithTelegram()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                                    <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161l-1.97 9.291c-.145.658-.537.818-1.084.508l-3-2.211-1.447 1.394c-.161.161-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.121l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.832.932z"/>
                                </svg>
                                Открыть Telegram
                            </button>
                            <div class="telegram-widget-wrapper">
                                <div style="font-size:13px;color:var(--secondary-text);margin-bottom:10px;">Или через виджет:</div>
                                <div id="telegram-widget-direct"></div>
                            </div>
                        </div>
                    `;
                    loadTelegramWidget();
                } else {
                    const myP = Object.values(parkingsData).filter(p => p.owner === currentUser.id);
                    const free = myP.filter(p => p.status === 'free').length;
                    const busy = myP.filter(p => p.status === 'busy').length;
                    
                    content.innerHTML = `
                        <div style="text-align:center; padding: 20px;">
                            <div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#007AFF,#5856D6);color:white;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;margin:0 auto 12px;">${getInitials(currentUser.firstName)}</div>
                            <div style="font-size:18px;font-weight:700;">${currentUser.firstName}</div>
                            <div style="color:var(--secondary-text);">@${currentUser.username}</div>
                        </div>
                        <div class="theme-toggle-container">
                            <span>🌙 Темная тема</span>
                            <label class="switch">
                                <input type="checkbox" ${currentTheme === 'dark' ? 'checked' : ''} onchange="toggleTheme()">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-number">${myP.length}</div><div class="stat-label">Парковок</div></div>
                            <div class="stat-card"><div class="stat-number">${free}</div><div class="stat-label">Свободно</div></div>
                            <div class="stat-card"><div class="stat-number">${busy}</div><div class="stat-label">Занято</div></div>
                        </div>
                        <div style="padding: 0 16px;">
                            <button onclick="logout()" style="width:100%; padding:14px; background:transparent; color:#FF3B30; border:1px solid #FF3B30; border-radius:12px; font-weight:600; cursor:pointer;">🚪 Выйти</button>
                        </div>
                    `;
                }
            } else if(type === 'history') {
                if(!currentUser) { 
                    content.innerHTML = '<div class="empty-state">🔒 Войдите</div>'; 
                    return; 
                }
                const list = Object.keys(parkingsData)
                    .filter(id => parkingsData[id].owner === currentUser.id)
                    .map(id => ({id, ...parkingsData[id]}))
                    .sort((a,b) => new Date(b.created) - new Date(a.created));
                
                if(!list.length) { 
                    content.innerHTML = '<div class="empty-state">📋 Пусто</div>'; 
                    return; 
                }
                
                content.innerHTML = '<div class="ios-list">' + list.map(p => `
                    <div class="ios-list-item" onclick='showParkingModal("${p.id}", parkingsData["${p.id}"])'>
                        <div class="list-icon ${p.status==="free"?"status-free":p.status==="busy"?"status-busy":"status-unknown"}"></div>
                        <div class="list-content">
                            <div class="list-title">${p.name}</div>
                            <div class="list-subtitle">${getStatusText(p.status)}</div>
                        </div>
                        <div style="background:#007AFF;color:white;padding:4px 10px;border-radius:10px;font-size:12px;font-weight:600;">${p.places}</div>
                    </div>
                `).join('') + '</div>';
            } else if(type === 'favorites') {
                if(!myHomes.length) { 
                    content.innerHTML = '<div class="empty-state">🏠 Нет домов</div>'; 
                    return; 
                }
                content.innerHTML = '<div class="ios-list">' + myHomes.map(h => { 
                    const cnt = countNear(h.coords); 
                    return `<div class="ios-list-item">
                        <div class="list-icon" style="background:#FF9500;">🏠</div>
                        <div class="list-content">
                            <div class="list-title">${h.address}</div>
                            <div class="list-subtitle">${cnt} парковок рядом</div>
                        </div>
                        <span style="font-size:22px;color:#FF9500;cursor:pointer;" onclick="database.ref('homes/${currentUser.id}/${h.id}').remove().then(()=>{showToast('Удалено');loadHomes()})">★</span>
                    </div>`; 
                }).join('') + '</div>';
            }
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('appTheme', currentTheme);
        }
    </script>
</body>
</html>
