<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Park Near</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=75eb2fa2-7ab4-4322-9fa3-d7581badafd2&lang=ru_RU"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            overflow: hidden; height: 100vh; height: 100dvh;
            background: #F2F2F7; color: #000;
            transition: background 0.3s, color 0.3s;
        }
        body.dark { background: #000; color: #fff; }
        .app-header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(255,255,255,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.1); padding-top: env(safe-area-inset-top);
        }
        body.dark .app-header { background: rgba(28,28,30,0.45); }
        .app-title { font-size: 22px; font-weight: 700; }
        .app-title span { color: #007AFF; font-weight: 800; }
        #map { position: fixed; top: 60px; left: 0; right: 0; bottom: 83px; }
        .controls { position: fixed; top: 80px; left: 16px; z-index: 900; display: flex; flex-direction: column; gap: 10px; }
        .btn {
            width: 44px; height: 44px; border-radius: 12px; background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px); border: none; font-size: 20px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
        }
        .btn:active { transform: scale(0.95); }
        #addBtn {
            position: fixed; bottom: 100px; right: 20px; z-index: 900;
            width: 56px; height: 56px; border-radius: 50%; background: #007AFF;
            color: #fff; border: none; font-size: 28px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,122,255,0.4);
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
        }
        #addBtn.drawing { background: #FF3B30; }
        .tabBar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 83px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
            z-index: 1000; display: flex; border-top: 0.5px solid rgba(0,0,0,0.1);
            padding-bottom: env(safe-area-inset-bottom);
        }
        body.dark .tabBar { background: rgba(28,28,30,0.85); }
        .tab {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .tab .icon { font-size: 24px; margin-bottom: 4px; }
        .tab .label { font-size: 10px; color: #8E8E93; }
        .tab.active .label { color: #007AFF; font-weight: 600; }
        .panel {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: inherit; z-index: 2000; transform: translateY(100%);
            transition: transform 0.3s; display: flex; flex-direction: column;
        }
        .panel.active { transform: translateY(0); }
        .panel-header {
            padding: 16px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .panel-title { font-size: 24px; font-weight: 700; }
        .panel-close { color: #007AFF; background: none; border: none; font-size: 17px; cursor: pointer; }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; }

        .input-field {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ccc;
            font-size: 18px; margin: 8px 0; background: #fff; color: #000;
        }
        body.dark .input-field { background: #1C1C1E; color: #fff; border-color: #444; }
        .primary-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer; color: #fff;
            background: #007AFF; margin: 8px 0;
        }
        .primary-btn:disabled { background: #999; }
        .guest-btn {
            width: 100%; padding: 16px; border-radius: 12px;
            border: 1px solid #007AFF; font-size: 16px; font-weight: 600;
            cursor: pointer; color: #007AFF; background: transparent; margin: 8px 0;
        }
        .empty-state { text-align: center; padding: 40px 20px; color: #8E8E93; }
    </style>
</head>
<body>
    <div class="app-header"><div class="app-title">Park<span>Near</span></div></div>
    <div id="map"></div>
    <div class="controls">
        <button class="btn" onclick="showMyLocation()">📍</button>
        <button class="btn" onclick="toggleMapType()">🗺️</button>
    </div>
    <button id="addBtn">+</button>

    <div class="panel" id="panel">
        <div class="panel-header">
            <div class="panel-title" id="panelTitle">Профиль</div>
            <button class="panel-close" onclick="closePanel()">Готово</button>
        </div>
        <div class="panel-content" id="panelContent"></div>
    </div>

    <div class="tabBar">
        <div class="tab active" onclick="showMap()"><div class="icon">🗺️</div><div class="label">Карта</div></div>
        <div class="tab" onclick="showPanel('history')"><div class="icon">🕘</div><div class="label">История</div></div>
        <div class="tab" onclick="showPanel('favorites')"><div class="icon">⭐</div><div class="label">Избранное</div></div>
        <div class="tab" onclick="showPanel('profile')"><div class="icon">👤</div><div class="label">Профиль</div></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyATLX5t2lmibbuiSXL_sWu_JnFFTb-nMqU",
            authDomain: "parknear-bef41.firebaseapp.com",
            databaseURL: "https://parknear-bef41-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "parknear-bef41",
            storageBucket: "parknear-bef41.firebasestorage.app",
            messagingSenderId: "1066552333578",
            appId: "1:1066552333578:web:e60e333cf877852eba16f3"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let map = null;
        let currentUser = null;
        let confirmationResult = null;

        function initMap() {
            map = new ymaps.Map("map", { center: [55.7558, 37.6173], zoom: 10, controls: ['zoomControl'], type: 'yandex#map' });
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    map.setCenter([pos.coords.latitude, pos.coords.longitude], 14);
                }, () => {});
            }
            const saved = localStorage.getItem('tgUser');
            if (saved) currentUser = JSON.parse(saved);
        }

        if (typeof ymaps !== 'undefined') ymaps.ready(initMap);
        else window.addEventListener('load', () => { if (typeof ymaps !== 'undefined') ymaps.ready(initMap); });

        function toggleMapType() { alert('Карта: схема/спутник'); }
        function showMyLocation() {
            if (navigator.geolocation) navigator.geolocation.getCurrentPosition(pos => {
                map.setCenter([pos.coords.latitude, pos.coords.longitude], 14);
            });
        }

        // ---- ВХОД ПО ТЕЛЕФОНУ (ПРОСТАЯ ВЕРСИЯ) ----
        function showPhoneLogin() {
            const content = document.getElementById('panelContent');
            content.innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <div style="font-size:60px; margin-bottom:20px;">📱</div>
                    <div style="font-size:18px; font-weight:600; margin-bottom:20px;">Вход по номеру телефона</div>
                    <input type="tel" class="input-field" id="phoneNumber" placeholder="+7 999 123 45 67">
                    <div id="recaptcha"></div>
                    <button class="primary-btn" id="sendBtn" onclick="sendSMS()">Получить код</button>
                    <div id="codeBlock" style="display:none;">
                        <input type="text" class="input-field" id="smsCode" placeholder="Код из SMS" maxlength="6" style="text-align:center; letter-spacing:8px; font-size:24px;">
                        <button class="primary-btn" onclick="confirmSMS()">Подтвердить</button>
                    </div>
                    <button class="guest-btn" onclick="continueAsGuest()">Продолжить как гость</button>
                    <button onclick="showPanel('profile')" style="background:none; border:none; color:#007AFF; margin-top:12px; cursor:pointer;">← Назад</button>
                </div>
            `;
            // Невидимая reCAPTCHA
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha', {
                    'size': 'invisible',
                    'callback': () => {}
                });
            }
        }

        function sendSMS() {
            const phone = document.getElementById('phoneNumber').value.trim();
            if (!phone) { alert('Введите номер телефона'); return; }
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = 'Отправка...';

            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
                .then(result => {
                    confirmationResult = result;
                    document.getElementById('codeBlock').style.display = 'block';
                    btn.textContent = 'Код отправлен';
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.textContent = 'Получить код';
                    alert('Ошибка: ' + err.message);
                });
        }

        function confirmSMS() {
            const code = document.getElementById('smsCode').value.trim();
            if (!code) { alert('Введите код из SMS'); return; }
            confirmationResult.confirm(code)
                .then(result => {
                    currentUser = {
                        id: result.user.uid,
                        username: result.user.phoneNumber,
                        firstName: result.user.phoneNumber,
                        photoUrl: ''
                    };
                    localStorage.setItem('tgUser', JSON.stringify(currentUser));
                    showPanel('profile');
                })
                .catch(err => alert('Неверный код: ' + err.message));
        }

        function continueAsGuest() {
            currentUser = { id: 'guest_'+Date.now(), username: 'guest', firstName: 'Гость', photoUrl: '' };
            localStorage.setItem('tgUser', JSON.stringify(currentUser));
            showPanel('profile');
        }

        function logout() {
            auth.signOut();
            currentUser = null;
            localStorage.removeItem('tgUser');
            showPanel('profile');
        }

        function showPanel(type) {
            document.getElementById('panel').classList.add('active');
            document.getElementById('panelTitle').textContent = type==='history'?'История':type==='favorites'?'Избранное':'Профиль';
            const content = document.getElementById('panelContent');

            if (type === 'profile') {
                if (!currentUser) {
                    content.innerHTML = `
                        <div style="text-align:center; padding:40px 20px;">
                            <div style="font-size:60px; margin-bottom:20px;">👤</div>
                            <div style="font-size:18px; font-weight:600; margin-bottom:20px;">Вход</div>
                            <button class="primary-btn" onclick="showPhoneLogin()">📱 Войти по номеру телефона</button>
                            <button class="guest-btn" onclick="continueAsGuest()">Продолжить как гость</button>
                        </div>
                    `;
                } else {
                    const isGuest = currentUser.id.startsWith('guest_');
                    content.innerHTML = `
                        <div style="text-align:center; padding:20px;">
                            <div style="width:70px;height:70px;border-radius:50%;background:#007AFF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;">📱</div>
                            <div style="font-size:18px;font-weight:700;">${currentUser.firstName} ${isGuest?'(гость)':''}</div>
                            <div style="color:#8E8E93;">${currentUser.username}</div>
                        </div>
                        <button onclick="logout()" style="width:100%;padding:14px;color:#FF3B30;background:transparent;border:1px solid #FF3B30;border-radius:12px;font-weight:600;margin-top:20px;">🚪 Выйти</button>
                    `;
                }
            } else if (type === 'history') {
                content.innerHTML = '<div class="empty-state">История пуста</div>';
            } else if (type === 'favorites') {
                content.innerHTML = '<div class="empty-state">🏠 Нет избранного</div>';
            }
        }

        function closePanel() { document.getElementById('panel').classList.remove('active'); }
        function showMap() {
            closePanel();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.tab:first-child').classList.add('active');
        }
    </script>
</body>
</html>
