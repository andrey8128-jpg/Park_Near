<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Park Near</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=75eb2fa2-7ab4-4322-9fa3-d7581badafd2&lang=ru_RU"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            overflow: hidden; height: 100vh; height: 100dvh;
            background: #F2F2F7; color: #000;
        }
        .app-header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: #fff; z-index: 1000; display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #ddd; padding-top: env(safe-area-inset-top);
        }
        .app-title { font-size: 22px; font-weight: 700; }
        .app-title span { color: #007AFF; font-weight: 800; }
        #map { position: fixed; top: 60px; left: 0; right: 0; bottom: 83px; }
        #addBtn {
            position: fixed; bottom: 100px; right: 20px; z-index: 900;
            width: 56px; height: 56px; border-radius: 50%;
            background: #007AFF; color: #fff; border: none;
            font-size: 28px; cursor: pointer;
        }
        .tabBar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 83px;
            background: #fff; z-index: 1000; display: flex;
            border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom);
        }
        .tab {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .tab .icon { font-size: 24px; margin-bottom: 4px; }
        .tab .label { font-size: 10px; color: #8E8E93; }
        .tab.active .label { color: #007AFF; font-weight: 600; }
        .panel {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #F2F2F7; z-index: 2000;
            transform: translateY(100%); transition: transform 0.3s;
            display: flex; flex-direction: column;
        }
        .panel.active { transform: translateY(0); }
        .panel-header {
            padding: 16px 20px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid #ddd; background: #fff;
        }
        .panel-title { font-size: 24px; font-weight: 700; }
        .panel-close { color: #007AFF; background: none; border: none; font-size: 17px; cursor: pointer; }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; }

        .telegram-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; width: 100%; padding: 16px; border-radius: 12px;
            border: none; font-size: 16px; font-weight: 600;
            cursor: pointer; color: #fff; background: #0088cc;
            text-decoration: none; margin: 8px 0;
        }
        .guest-btn {
            width: 100%; padding: 16px; border-radius: 12px;
            border: 1px solid #007AFF; font-size: 16px; font-weight: 600;
            cursor: pointer; color: #007AFF; background: transparent; margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="app-header"><div class="app-title">Park<span>Near</span></div></div>
    <div id="map"></div>
    <button id="addBtn">+</button>

    <div class="panel" id="panel">
        <div class="panel-header">
            <div class="panel-title" id="panelTitle">Профиль</div>
            <button class="panel-close" onclick="closePanel()">Готово</button>
        </div>
        <div class="panel-content" id="panelContent"></div>
    </div>

    <div class="tabBar">
        <div class="tab active" onclick="showMap()"><div class="icon">🗺️</div><div class="label">Карта</div></div>
        <div class="tab" onclick="showPanel('history')"><div class="icon">🕘</div><div class="label">История</div></div>
        <div class="tab" onclick="showPanel('favorites')"><div class="icon">⭐</div><div class="label">Избранное</div></div>
        <div class="tab" onclick="showPanel('profile')"><div class="icon">👤</div><div class="label">Профиль</div></div>
    </div>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyATLX5t2lmibbuiSXL_sWu_JnFFTb-nMqU",
            authDomain: "parknear-bef41.firebaseapp.com",
            databaseURL: "https://parknear-bef41-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "parknear-bef41",
            storageBucket: "parknear-bef41.firebasestorage.app",
            messagingSenderId: "1066552333578",
            appId: "1:1066552333578:web:e60e333cf877852eba16f3"
        });
        const database = firebase.database();
        let map, currentUser = null;

        function initMap() {
            map = new ymaps.Map("map", {
                center: [55.7558, 37.6173], zoom: 10,
                controls: ['zoomControl'], type: 'yandex#map'
            });
            const saved = localStorage.getItem('tgUser');
            if (saved) currentUser = JSON.parse(saved);
        }
        if (typeof ymaps !== 'undefined') ymaps.ready(initMap);
        else window.addEventListener('load', () => ymaps.ready(initMap));

        function loginWithTelegram() {
            window.open('https://t.me/parknear_bot', '_blank');
        }

        function continueAsGuest() {
            currentUser = { id: 'guest_' + Date.now(), username: 'guest', firstName: 'Гость', photoUrl: '' };
            localStorage.setItem('tgUser', JSON.stringify(currentUser));
            showPanel('profile');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('tgUser');
            showPanel('profile');
        }

        function showPanel(type) {
            document.getElementById('panel').classList.add('active');
            document.getElementById('panelTitle').textContent = type === 'profile' ? 'Профиль' : type;
            const content = document.getElementById('panelContent');

            if (type === 'profile') {
                if (!currentUser) {
                    // ⬇️ ВОТ КНОПКИ ВХОДА ⬇️
                    content.innerHTML = `
                        <div style="text-align:center; padding:40px 20px;">
                            <div style="font-size:60px; margin-bottom:20px;">👤</div>
                            <div style="font-size:18px; font-weight:600; margin-bottom:20px;">Вход</div>
                            <button class="telegram-btn" onclick="loginWithTelegram()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161l-1.97 9.291c-.145.658-.537.818-1.084.508l-3-2.211-1.447 1.394c-.161.161-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.342-.213-.333-.373.121l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.832.932z"/></svg>
                                Войти через Telegram
                            </button>
                            <button class="guest-btn" onclick="continueAsGuest()">Продолжить как гость</button>
                        </div>
                    `;
                } else {
                    const isGuest = currentUser.id.startsWith('guest_');
                    content.innerHTML = `
                        <div style="text-align:center; padding:20px;">
                            <div style="font-size:40px;">👤</div>
                            <div style="font-size:18px; font-weight:700;">${currentUser.firstName} ${isGuest?'(гость)':''}</div>
                            <div style="color:#8E8E93;">${currentUser.username}</div>
                            <button onclick="logout()" style="width:100%;padding:14px;color:#FF3B30;background:transparent;border:1px solid #FF3B30;border-radius:12px;font-weight:600;margin-top:20px;">🚪 Выйти</button>
                        </div>
                    `;
                }
            } else {
                content.innerHTML = '<div style="text-align:center;padding:40px;color:#8E8E93;">Пусто</div>';
            }
        }

        function closePanel() { document.getElementById('panel').classList.remove('active'); }
        function showMap() {
            closePanel();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.tab:first-child').classList.add('active');
        }
    </script>
</body>
</html>
