<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ParkNear</title>
<meta name="theme-color" content="#007AFF">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://api-maps.yandex.ru/2.1/?apikey=75eb2fa2-7ab4-4322-9fa3-d7581badafd2&lang=ru_RU"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
    --bg-primary: #F2F2F7; --bg-secondary: #FFFFFF; --text-primary: #000000;
    --text-secondary: #8E8E93; --border-color: rgba(0,0,0,0.1); --input-bg: #FFFFFF;
    --input-border: #C7C7CC; --card-shadow: 0 2px 10px rgba(0,0,0,0.05);
    --accent: #007AFF; --green: #34C759; --red: #FF3B30; --orange: #FF9500;
}
body.dark-theme {
    --bg-primary: #000000; --bg-secondary: #1C1C1E; --text-primary: #FFFFFF;
    --text-secondary: #98989D; --border-color: rgba(255,255,255,0.15);
    --input-bg: #2C2C2E; --input-border: #3A3A3C; --card-shadow: 0 2px 10px rgba(0,0,0,0.3);
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow: hidden; height: 100vh; height: 100dvh;
    background: var(--bg-primary); color: var(--text-primary);
    transition: background 0.3s, color 0.3s;
    -webkit-font-smoothing: antialiased;
}

/* Header */
.app-header {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    border-bottom: 0.5px solid var(--border-color); padding-top: env(safe-area-inset-top);
}
body.dark-theme .app-header { background: rgba(28,28,30,0.8); }
.app-title { font-size: 17px; font-weight: 600; letter-spacing: -0.5px; }
.app-title span { color: var(--accent); }

/* Map */
#map {
    position: fixed; top: 44px; left: 0; right: 0; bottom: 83px;
    background: #E5E5EA; z-index: 1;
}
body.dark-theme #map { filter: invert(0.85) hue-rotate(180deg) brightness(0.95) contrast(0.9); }
body.dark-theme #map .ymaps-2-1-79-map-pane img { filter: invert(1) hue-rotate(180deg); }

#mapLoader {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    background: var(--bg-primary); z-index: 10;
}
.spinner {
    width: 32px; height: 32px; border: 3px solid var(--border-color);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Buttons & Controls */
.fab {
    position: fixed; z-index: 900; width: 56px; height: 56px; border-radius: 50%;
    border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.15); transition: transform 0.2s;
}
.fab:active { transform: scale(0.9); }
.fab svg { width: 24px; height: 24px; }

#geoBtn { bottom: 160px; right: 20px; background: var(--bg-secondary); }
#geoBtn svg { fill: var(--accent); }

#addBtn { bottom: 100px; right: 20px; background: var(--accent); }
#addBtn svg { fill: #fff; }
#addBtn.active-mode { background: var(--red); }

/* Tab Bar */
.tabBar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 83px;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
    z-index: 1000; display: flex;
    border-top: 0.5px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom);
}
body.dark-theme .tabBar { background: rgba(28,28,30,0.9); }
.tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer; gap: 4px;
}
.tab svg { width: 26px; height: 26px; fill: var(--text-secondary); transition: fill 0.2s; }
.tab .label { font-size: 10px; color: var(--text-secondary); font-weight: 500; transition: color 0.2s; }
.tab.active svg { fill: var(--accent); }
.tab.active .label { color: var(--accent); font-weight: 600; }

/* Panels & Sheets */
.panel {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg-primary); z-index: 2000;
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex; flex-direction: column;
}
.panel.active { transform: translateY(0); }
.panel-header {
    padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 0.5px solid var(--border-color); background: var(--bg-secondary);
    padding-top: calc(16px + env(safe-area-inset-top));
}
.panel-title { font-size: 17px; font-weight: 600; }
.panel-close { color: var(--accent); background: none; border: none; font-size: 17px; cursor: pointer; font-weight: 600; }
.panel-content { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }

.bottom-sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg-secondary); border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15); z-index: 2500;
    transform: translateY(100%); transition: transform 0.3s ease;
    max-height: 80vh; display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
}
.bottom-sheet.active { transform: translateY(0); }
.sheet-handle { width: 40px; height: 5px; background: var(--border-color); border-radius: 3px; margin: 8px auto; }
.sheet-content { padding: 0 20px 20px; overflow-y: auto; }

/* UI Elements */
.btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.2s;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.btn-success { background: var(--green); color: #fff; }
.btn-secondary { background: var(--bg-primary); color: var(--accent); border: 1px solid var(--accent); }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.input-field {
    width: 100%; padding: 12px 16px; border-radius: 12px;
    border: 1px solid var(--input-border); background: var(--input-bg);
    color: var(--text-primary); font-size: 16px; outline: none; font-family: inherit;
}
.input-field:focus { border-color: var(--accent); }

.card {
    background: var(--bg-secondary); border-radius: 16px; padding: 20px;
    margin-bottom: 16px; box-shadow: var(--card-shadow);
}
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 0.5px solid var(--border-color); }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-secondary); font-size: 15px; }
.stat-value { font-weight: 600; font-size: 15px; }

.map-hint {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
    border-radius: 20px; font-size: 14px; z-index: 800; white-space: nowrap;
    animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }

.status-badge {
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
    border-radius: 20px; font-size: 13px; font-weight: 600;
}
.status-free { background: rgba(52, 199, 89, 0.15); color: var(--green); }
.status-busy { background: rgba(255, 59, 48, 0.15); color: var(--red); }
.status-unknown { background: rgba(142, 142, 147, 0.15); color: var(--text-secondary); }

.list-item {
    background: var(--bg-secondary); padding: 16px; border-radius: 16px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    box-shadow: var(--card-shadow); cursor: pointer;
}
.list-item:active { opacity: 0.8; }
.list-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; }
.list-icon svg { width: 24px; height: 24px; fill: var(--accent); }
.list-info { flex: 1; }
.list-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.list-subtitle { font-size: 13px; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="app-header">
    <div class="app-title">Park<span>Near</span></div>
</div>

<div id="map">
    <div id="mapLoader">
        <div class="spinner"></div>
        <p style="color:var(--text-secondary);">Загрузка карты...</p>
    </div>
</div>

<!-- SVG Icons for FABs -->
<button id="geoBtn" class="fab" title="Моё местоположение">
    <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
</button>

<button id="addBtn" class="fab" title="Добавить парковку">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
</button>

<!-- Bottom Sheet for Parking Details -->
<div class="bottom-sheet" id="parkingSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content" id="sheetContent"></div>
</div>

<!-- Main Panel (Profile, Search, Add) -->
<div class="panel" id="panel">
    <div class="panel-header">
        <div class="panel-title" id="panelTitle">Профиль</div>
        <button class="panel-close" onclick="closePanel()">Закрыть</button>
    </div>
    <div class="panel-content" id="panelContent"></div>
</div>

<!-- Tab Bar with SVG Icons -->
<div class="tabBar">
    <div class="tab active" onclick="showTab('map')">
        <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
        <div class="label">Карта</div>
    </div>
    <div class="tab" onclick="showTab('search')">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <div class="label">Поиск</div>
    </div>
    <div class="tab" onclick="showTab('add')">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        <div class="label">Добавить</div>
    </div>
    <div class="tab" onclick="showTab('profile')">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <div class="label">Профиль</div>
    </div>
</div>

<script>
// ===================== FIREBASE =====================
const firebaseConfig = {
    apiKey: "AIzaSyATLX5t2lmibbuiSXL_sWu_JnFFTb-nMqU",
    authDomain: "parknear-bef41.firebaseapp.com",
    databaseURL: "https://parknear-bef41-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "parknear-bef41",
    storageBucket: "parknear-bef41.firebasestorage.app",
    messagingSenderId: "1066552333578",
    appId: "1:1066552333578:web:e60e333cf877852eba16f3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===================== GLOBALS =====================
let map = null;
let currentUser = null;
let markers = {};
let isPinMode = false;
let tempPin = null;

// ===================== AUTH =====================
function initAuth() {
    if (window.Telegram?.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        if (tg.initDataUnsafe?.user) {
            const u = tg.initDataUnsafe.user;
            currentUser = { id: 'tg_' + u.id, name: u.first_name || 'User', username: u.username || '' };
        }
    }
    if (!currentUser) {
        const saved = localStorage.getItem('pn_user');
        if (saved) currentUser = JSON.parse(saved);
        else {
            currentUser = { id: 'guest_' + Date.now(), name: 'Гость', username: 'guest' };
            localStorage.setItem('pn_user', JSON.stringify(currentUser));
        }
    }
}

// ===================== MAP INIT =====================
function initMap() {
    if (typeof ymaps === 'undefined') {
        showMapError();
        return;
    }

    ymaps.ready(() => {
        try {
            map = new ymaps.Map("map", {
                center: [55.7558, 37.6173],
                zoom: 14,
                controls: ['zoomControl'],
                type: 'yandex#map'
            });
            
            document.getElementById('mapLoader').style.display = 'none';
            
            // Geo button
            document.getElementById('geoBtn').onclick = () => {
                ymaps.geolocation.get().then(res => {
                    const coords = res.geoObjects.get(0).geometry.getCoordinates();
                    map.setCenter(coords, 16, { duration: 500 });
                }, () => alert('Не удалось определить местоположение'));
            };

            // Add button (Pin mode)
            document.getElementById('addBtn').onclick = togglePinMode;

            // Map click for pin drop
            map.events.add('click', (e) => {
                if (isPinMode) {
                    const coords = e.get('coords');
                    placeTempPin(coords);
                }
            });

            loadParkings();
            
            // Auto geolocation
            ymaps.geolocation.get().then(res => {
                const coords = res.geoObjects.get(0).geometry.getCoordinates();
                map.setCenter(coords, 14, { duration: 500 });
            }).catch(() => {});

        } catch (e) {
            console.error('Map init error:', e);
            showMapError();
        }
    });
}

function showMapError() {
    const loader = document.getElementById('mapLoader');
    loader.innerHTML = `
        <div style="text-align:center; padding:20px;">
            <div style="font-size:48px; margin-bottom:16px;">🗺️</div>
            <h3 style="margin-bottom:8px;">Карта не загрузилась</h3>
            <p style="color:var(--text-secondary); margin-bottom:20px; font-size:14px;">Возможно, нет интернета или API заблокировано.</p>
            <button onclick="location.reload()" class="btn btn-primary" style="width:auto; padding:12px 24px;">Попробовать снова</button>
        </div>
    `;
}

// ===================== PIN MODE (NEW LOGIC) =====================
function togglePinMode() {
    if (!currentUser) {
        showTab('profile');
        return;
    }
    
    isPinMode = !isPinMode;
    const btn = document.getElementById('addBtn');
    
    if (isPinMode) {
        btn.classList.add('active-mode');
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path fill="#fff" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';
        showHint('Ткните в карту, чтобы добавить парковку');
        map.cursors.push('arrow');
    } else {
        btn.classList.remove('active-mode');
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path fill="#fff" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>';
        if (tempPin) {
            map.geoObjects.remove(tempPin);
            tempPin = null;
        }
    }
}

function placeTempPin(coords) {
    if (tempPin) map.geoObjects.remove(tempPin);
    
    tempPin = new ymaps.Placemark(coords, {}, {
        preset: 'islands#blueCircleDotIcon',
        draggable: true
    });
    
    tempPin.events.add('dragend', () => {
        openAddSheet(tempPin.geometry.getCoordinates());
    });
    
    map.geoObjects.add(tempPin);
    openAddSheet(coords);
}

function openAddSheet(coords) {
    const sheet = document.getElementById('parkingSheet');
    const content = document.getElementById('sheetContent');
    
    content.innerHTML = `
        <h3 style="margin-bottom:16px;">Новая парковка</h3>
        <p style="color:var(--text-secondary); margin-bottom:16px; font-size:14px;">
            Координаты: ${coords[0].toFixed(5)}, ${coords[1].toFixed(5)}
        </p>
        <div class="form-group">
            <label>Название</label>
            <input type="text" id="newParkName" class="input-field" placeholder="Например: У ТЦ Метро">
        </div>
        <div class="form-group">
            <label>Всего мест</label>
            <input type="number" id="newParkTotal" class="input-field" placeholder="10" min="1" max="500">
        </div>
        <div class="form-group">
            <label>Платная?</label>
            <select id="newParkPaid" class="input-field">
                <option value="false">Бесплатная</option>
                <option value="true">Платная</option>
            </select>
        </div>
        <button class="btn btn-success" onclick="saveNewParking([${coords[0]}, ${coords[1]}])">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            Сохранить
        </button>
        <button class="btn btn-secondary" onclick="closeSheet(); togglePinMode();">Отмена</button>
    `;
    
    sheet.classList.add('active');
}

function saveNewParking(coords) {
    const name = document.getElementById('newParkName').value.trim();
    const total = parseInt(document.getElementById('newParkTotal').value);
    const isPaid = document.getElementById('newParkPaid').value === 'true';

    if (!name) return alert('Введите название');
    if (!total || total < 1) return alert('Укажите количество мест');

    const newData = {
        lat: coords[0],
        lng: coords[1],
        name: name,
        total: total,
        current: 0, // 0 means all free initially
        isPaid: isPaid,
        author: currentUser.id,
        timestamp: Date.now()
    };

    const ref = db.ref('parkings').push();
    ref.set(newData).then(() => {
        closeSheet();
        togglePinMode();
        showHint('Парковка добавлена!');
    }).catch(err => alert('Ошибка сохранения: ' + err.message));
}

// ===================== LOAD & RENDER PARKINGS =====================
function loadParkings() {
    db.ref('parkings').on('value', (snap) => {
        const data = snap.val();
        
        // Clear old markers
        Object.keys(markers).forEach(id => {
            if (!data || !data[id]) {
                map.geoObjects.remove(markers[id]);
                delete markers[id];
            }
        });

        if (!data) return;

        Object.keys(data).forEach(id => {
            const p = data[id];
            if (markers[id]) {
                // Update existing
                updateMarker(id, p);
            } else {
                // Create new
                createMarker(id, p);
            }
        });
    });
}

function getMarkerColor(current, total) {
    if (total === 0) return '#8E8E93';
    const ratio = current / total;
    if (ratio >= 1) return '#FF3B30'; // Red (Full)
    if (ratio > 0.7) return '#FF9500'; // Orange (Almost full)
    return '#34C759'; // Green (Free)
}

function createMarker(id, data) {
    const free = data.total - data.current;
    const color = getMarkerColor(data.current, data.total);
    
    const placemark = new ymaps.Placemark(
        [data.lat, data.lng],
        { 
            hintContent: `${data.name} (Свободно: ${free})`,
            iconContent: free
        },
        {
            preset: 'islands#blueCircleDotIcon',
            iconColor: color
        }
    );

    placemark.events.add('click', () => openParkingDetails(id, data));
    
    map.geoObjects.add(placemark);
    markers[id] = placemark;
}

function updateMarker(id, data) {
    const free = data.total - data.current;
    const color = getMarkerColor(data.current, data.total);
    
    markers[id].properties.set('hintContent', `${data.name} (Свободно: ${free})`);
    markers[id].properties.set('iconContent', free);
    markers[id].options.set('iconColor', color);
}

// ===================== PARKING DETAILS (CROWDSOURCING LOGIC) =====================
function openParkingDetails(id, data) {
    const sheet = document.getElementById('parkingSheet');
    const content = document.getElementById('sheetContent');
    const free = data.total - data.current;
    const isFull = free <= 0;
    const statusClass = isFull ? 'status-busy' : (free < data.total * 0.3 ? 'status-busy' : 'status-free');
    const statusText = isFull ? 'Мест нет' : `Свободно: ${free}`;

    content.innerHTML = `
        <h3 style="margin-bottom:8px;">${data.name}</h3>
        <div style="margin-bottom:16px;">
            <span class="status-badge ${statusClass}">${statusText}</span>
            ${data.isPaid ? '<span class="status-badge status-unknown" style="margin-left:8px;">Платная</span>' : ''}
        </div>
        
        <div class="card">
            <div class="stat-row">
                <span class="stat-label">Всего мест</span>
                <span class="stat-value">${data.total}</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Занято</span>
                <span class="stat-value" style="color:var(--red);">${data.current}</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Свободно</span>
                <span class="stat-value" style="color:var(--green);">${free}</span>
            </div>
        </div>

        <h4 style="margin-bottom:12px; font-size:15px;">Обновить статус:</h4>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-success" style="flex:1;" onclick="updateStatus('${id}', -1)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M18 13h-5v5h-2v-5H6v-2h5V6h2v5h5v2z"/></svg>
                Освободил
            </button>
            <button class="btn btn-danger" style="flex:1;" onclick="updateStatus('${id}', 1)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Занял
            </button>
        </div>
        <button class="btn btn-secondary" onclick="closeSheet()">Закрыть</button>
    `;

    sheet.classList.add('active');
}

function updateStatus(id, delta) {
    const ref = db.ref(`parkings/${id}`);
    ref.once('value').then(snap => {
        const data = snap.val();
        let newCurrent = data.current + delta;
        
        // Bounds checking
        if (newCurrent < 0) newCurrent = 0;
        if (newCurrent > data.total) {
            alert('Нельзя занять больше мест, чем есть на парковке!');
            return;
        }

        ref.update({ current: newCurrent, lastUpdated: Date.now(), lastUser: currentUser.id })
            .then(() => {
                showHint('Статус обновлен! Спасибо.');
                closeSheet();
            });
    });
}

// ===================== UI HELPERS =====================
function closeSheet() {
    document.getElementById('parkingSheet').classList.remove('active');
}

function showHint(text) {
    const existing = document.querySelector('.map-hint');
    if (existing) existing.remove();
    
    const hint = document.createElement('div');
    hint.className = 'map-hint';
    hint.textContent = text;
    document.body.appendChild(hint);
    setTimeout(() => hint.remove(), 3000);
}

function showTab(tabName) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    const panel = document.getElementById('panel');
    const content = document.getElementById('panelContent');
    const title = document.getElementById('panelTitle');

    if (tabName === 'map') {
        panel.classList.remove('active');
        return;
    }

    panel.classList.add('active');

    if (tabName === 'profile') {
        title.textContent = 'Профиль';
        content.innerHTML = `
            <div class="card" style="text-align:center;">
                <div style="font-size:48px; margin-bottom:12px;">👤</div>
                <h3>${currentUser.name}</h3>
                <p style="color:var(--text-secondary);">@${currentUser.username || 'user'}</p>
            </div>
            <div class="card">
                <h4 style="margin-bottom:12px;">Настройки</h4>
                <div class="stat-row">
                    <span class="stat-label">Тёмная тема</span>
                    <label class="switch">
                        <input type="checkbox" onchange="toggleTheme()" id="themeSwitch">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <button class="btn btn-danger" onclick="logout()">Выйти</button>
        `;
        if(document.body.classList.contains('dark-theme')) {
            document.getElementById('themeSwitch').checked = true;
        }
    } 
    
    else if (tabName === 'search') {
        title.textContent = 'Поиск';
        content.innerHTML = `
            <div class="form-group">
                <input type="text" id="searchInput" class="input-field" placeholder="Поиск по названию..." oninput="filterList()">
            </div>
            <div id="searchResults"></div>
        `;
        filterList();
    }
    
    else if (tabName === 'add') {
        title.textContent = 'Добавить';
        content.innerHTML = `
            <div class="card" style="text-align:center;">
                <div style="font-size:48px; margin-bottom:16px;">📍</div>
                <h3 style="margin-bottom:8px;">Режим добавления</h3>
                <p style="color:var(--text-secondary); margin-bottom:20px;">
                    Нажмите кнопку ниже, затем ткните в любое место на карте, чтобы добавить новую парковку.
                </p>
                <button class="btn btn-primary" onclick="closePanel(); togglePinMode();">
                    Включить режим добавления
                </button>
            </div>
        `;
    }
}

function filterList() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const container = document.getElementById('searchResults');
    let html = '';
    
    db.ref('parkings').once('value').then(snap => {
        const data = snap.val() || {};
        Object.keys(data).forEach(id => {
            const p = data[id];
            if (p.name.toLowerCase().includes(query)) {
                const free = p.total - p.current;
                html += `
                    <div class="list-item" onclick="focusParking('${id}', ${p.lat}, ${p.lng})">
                        <div class="list-icon">
                            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        </div>
                        <div class="list-info">
                            <div class="list-title">${p.name}</div>
                            <div class="list-subtitle">Свободно: ${free} из ${p.total}</div>
                        </div>
                    </div>
                `;
            }
        });
        container.innerHTML = html || '<p style="text-align:center; color:var(--text-secondary); padding:20px;">Ничего не найдено</p>';
    });
}

function focusParking(id, lat, lng) {
    closePanel();
    map.setCenter([lat, lng], 17, { duration: 400 });
    setTimeout(() => {
        db.ref(`parkings/${id}`).once('value').then(snap => {
            if(snap.exists()) openParkingDetails(id, snap.val());
        });
    }, 500);
}

function closePanel() {
    document.getElementById('panel').classList.remove('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.tab').classList.add('active');
}

function toggleTheme() {
    document.body.classList.toggle('dark-theme');
    localStorage.setItem('pn_theme', document.body.classList.contains('dark-theme'));
}

function logout() {
    localStorage.removeItem('pn_user');
    location.reload();
}

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded', () => {
    initAuth();
    
    // Theme
    if (localStorage.getItem('pn_theme') === 'true') {
        document.body.classList.add('dark-theme');
    }

    // Map init with timeout fallback
    let mapReady = false;
    const checkMap = setInterval(() => {
        if (typeof ymaps !== 'undefined') {
            clearInterval(checkMap);
            mapReady = true;
            initMap();
        }
    }, 100);

    setTimeout(() => {
        if (!mapReady) {
            clearInterval(checkMap);
            showMapError();
        }
    }, 8000); // 8 seconds timeout
});
</script>

</html>
