    <script>
        const firebaseConfig = { /* ваш конфиг */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ... все переменные и функции (initAuth, getDistanceInMeters, ...) без изменений ...
        // Ниже приведены только исправленные функции, остальной код остаётся прежним

        // --- Исправленная функция сохранения адреса ---
        function saveAddressFromPicker() {
            if (!currentUser) {
                alert('Необходимо войти в аккаунт');
                return;
            }
            if (!addressPickerCoords) {
                alert('Сначала установите метку на карте');
                return;
            }
            // Геокодируем координаты, чтобы получить текстовый адрес
            ymaps.geocode(addressPickerCoords)
                .then(res => {
                    const firstGeoObject = res.geoObjects.get(0);
                    const addressText = firstGeoObject ? firstGeoObject.getAddressLine() : 'Адрес не найден';
                    const homeRef = database.ref(`users/${currentUser.id}/homeAddresses`);
                    
                    // Проверяем текущее количество адресов
                    homeRef.once('value').then(snap => {
                        const addresses = snap.val() || {};
                        if (Object.keys(addresses).length >= 3) {
                            alert('Можно добавить не более 3 адресов.');
                            return;
                        }
                        const newAddrRef = homeRef.push();
                        newAddrRef.set({
                            address: addressText,
                            lat: addressPickerCoords[0],
                            lng: addressPickerCoords[1]
                        }).then(() => {
                            cancelAddressPicker();
                            showPanel('favorites'); // обновим панель избранного
                        }).catch(err => {
                            alert('Ошибка сохранения: ' + err.message);
                        });
                    });
                })
                .catch(err => {
                    console.error('Ошибка геокодирования:', err);
                    alert('Не удалось определить адрес. Попробуйте ещё раз.');
                });
        }

        // --- Остальные функции (addHomeAddress, openAddressPicker, ...) без изменений ---
        // addHomeAddress вызывает openAddressPicker (как и было)
        function addHomeAddress() {
            if (!currentUser) return;
            const homeRef = database.ref(`users/${currentUser.id}/homeAddresses`);
            homeRef.once('value').then(snap => {
                const addresses = snap.val() || {};
                if (Object.keys(addresses).length >= 3) {
                    alert('Можно добавить не более 3 адресов.');
                    return;
                }
                openAddressPicker(); // эта функция уже определена и работает
            });
        }
