<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
    body {
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .device-card {
        width: 320px;
        height: 320px;
        background-color: #1c1c1e; /* Темный фон как на фото */
        border-radius: 45px;
        position: relative;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding: 30px;
        box-sizing: border-box;
    }

    /* Текст слева сверху */
    .info-block {
        z-index: 10;
        margin-top: 10px;
    }

    .percent-text {
        font-size: 64px;
        font-weight: 700;
        color: #4ade80; /* Неоновый зеленый */
        line-height: 1;
        letter-spacing: -2px;
    }

    .label-text {
        font-size: 18px;
        color: #8e8e93;
        font-weight: 500;
        margin-top: 5px;
        display: block;
    }

    /* Контейнер для графики (шкала + молния) */
    .graphic-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 260px;
        height: 260px;
    }

    /* SVG графика */
    svg {
        width: 100%;
        height: 100%;
        overflow: visible;
    }

    /* Стили для делений шкалы */
    .tick {
        stroke: #3a3a3c;
        stroke-width: 4;
        stroke-linecap: round;
    }
    
    .tick.active {
        stroke: #ff9500; /* Оранжевый как на втором фото */
        filter: drop-shadow(0 0 2px rgba(255, 149, 0, 0.5));
    }

    /* Стили для молнии */
    .bolt-bg {
        fill: #2c2c2e; /* Темно-серый силуэт */
    }

    .bolt-fill {
        fill: #4ade80; /* Зеленый цвет заполнения */
        /* Анимация или статическое заполнение */
        clip-path: polygon(0 100%, 100% 100%, 100% 15%, 0 15%); 
        /* 15% сверху обрезано, чтобы показать 85% заполнения */
        transition: clip-path 0.5s ease;
    }
    
    /* Эффект свечения для молнии */
    .glow-effect {
        fill: none;
        stroke: #4ade80;
        stroke-width: 2;
        opacity: 0.5;
        filter: blur(4px);
    }

</style>
</head>
