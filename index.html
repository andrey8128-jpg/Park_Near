<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ParkNear</title>
    
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=75eb2fa2-7ab4-4322-9fa3-d7581badafd2&lang=ru_RU"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-primary: #F2F2F7;
            --bg-secondary: #fff;
            --text-primary: #000;
            --text-secondary: #8E8E93;
            --border-color: rgba(0,0,0,0.1);
            --input-bg: #fff;
            --input-border: #C7C7CC;
            --card-shadow: rgba(0,0,0,0.05);
        }
        
        body.dark-theme {
            --bg-primary: #000;
            --bg-secondary: #1C1C1E;
            --text-primary: #fff;
            --input-bg: #2C2C2E;
            --input-border: #3A3A3C;
            --card-shadow: rgba(0,0,0,0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            overflow: hidden; height: 100vh; height: 100dvh;
            background: var(--bg-primary); color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        
        .app-header, .tabBar, .panel-header {
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
        }
        body.dark-theme .app-header, body.dark-theme .tabBar, body.dark-theme .panel-header {
            background: rgba(28, 28, 30, 0.95);
        }
        
        .app-header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            border-bottom: 0.5px solid var(--border-color); padding-top: env(safe-area-inset-top);
        }
        .app-title { font-size: 20px; font-weight: 700; }
        .app-title span { color: #007AFF; }
        
        #map { 
            position: fixed; top: 60px; left: 0; right: 0; bottom: 83px; 
            background: #E5E5EA; transition: filter 0.5s ease;
        }
        body.dark-theme #map.yandex#map {
            filter: invert(0.82) hue-rotate(180deg) brightness(0.95) contrast(0.9) saturate(0.85);
        }
        
        .map-type-switcher {
            position: fixed; top: 70px; right: 12px; z-index: 900;
            background: var(--bg-secondary); backdrop-filter: blur(10px);
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 12px var(--card-shadow);
        }
        .map-type-btn {
            padding: 10px 14px; border: none; background: transparent;
            font-size: 13px; font-weight: 600; cursor: pointer;
            color: var(--text-primary); border-bottom: 0.5px solid var(--border-color);
        }
        .map-type-btn:last-child { border-bottom: none; }
        .map-type-btn.active { background: #007AFF; color: #fff; }

        #geoBtn, #addBtn {
            position: fixed; right: 20px; z-index: 900;
            border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 12px var(--card-shadow);
        }
        #geoBtn { bottom: 170px; width: 48px; height: 48px; background: var(--bg-secondary); }
        #geoBtn svg { width: 24px; height: 24px; fill: #007AFF; }
        #addBtn { bottom: 100px; width: 56px; height: 56px; background: #007AFF; color: #fff; font-size: 32px; }
        #addBtn.drawing { background: #FF9500; }
        
        .tabBar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 83px;
            z-index: 1000; display: flex;
            border-top: 0.5px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom);
        }
        .tab {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .tab .icon { font-size: 24px; margin-bottom: 4px; }
        .tab .label { font-size: 10px; color: var(--text-secondary); }
        .tab.active .label { color: #007AFF; font-weight: 600; }
        
        .panel {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary); z-index: 2000;
            transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex; flex-direction: column;
        }
        .panel.active { transform: translateY(0); }
        .panel-header {
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 0.5px solid var(--border-color);
            padding-top: calc(16px + env(safe-area-inset-top));
        }
        .panel-title { font-size: 17px; font-weight: 600; }
        .panel-close { color: #007AFF; background: none; border: none; font-size: 17px; cursor: pointer; }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        .input-field {
            width: 100%; padding: 12px 16px; border-radius: 10px;
            border: 1px solid var(--input-border); background: var(--input-bg); 
            color: var(--text-primary); font-size: 16px;
            outline: none; font-family: inherit; margin-bottom: 16px;
        }
        .input-field:focus { border-color: #007AFF; }
        
        .btn-primary, .btn-secondary, .btn-danger {
            width: 100%; padding: 16px; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            margin-top: 8px;
        }
        .btn-primary { background: #007AFF; color: #fff; border: none; }
        .btn-secondary { background: transparent; color: #007AFF; border: 1px solid #007AFF; }
        .btn-danger { background: transparent; color: #FF3B30; border: 1px solid #FF3B30; }
        
        .stat-card {
            flex: 1; background: var(--bg-secondary); border-radius: 12px;
            padding: 16px; text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: var(--text-secondary); }
        
        .parking-balloon { padding: 16px; min-width: 280px; }
        .parking-balloon-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .parking-balloon-stats { display: flex; gap: 8px; margin-bottom: 16px; }
        .parking-balloon-stat {
            flex: 1; text-align: center; padding: 8px;
            background: var(--bg-primary); border-radius: 8px;
        }
        .parking-balloon-stat-value { font-size: 20px; font-weight: 700; }
        .parking-balloon-stat-label { font-size: 11px; color: var(--text-secondary); }
        .parking-balloon-progress-bar {
            height: 6px; background: var(--bg-primary); border-radius: 3px;
            overflow: hidden; margin-bottom: 8px;
        }
        .parking-balloon-progress-fill { height: 100%; border-radius: 3px; }
        .parking-balloon-progress-text { font-size: 13px; color: var(--text-secondary); text-align: center; }
        .parking-balloon-buttons { display: flex; gap: 8px; margin-top: 16px; }
        .parking-balloon-buttons button {
            flex: 1; padding: 10px; border-radius: 8px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .btn-balloon-edit { background: #007AFF; color: #fff; }
        .btn-balloon-delete { background: #FF3B30; color: #fff; }
        
        .profile-header { text-align: center; padding: 20px 0 30px; }
        .profile-avatar img { width: 80px; height: 80px; border-radius: 50%; }
        .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .profile-username { font-size: 15px; color: var(--text-secondary); }
        
        .theme-toggle-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; background: var(--bg-secondary); border-radius: 12px;
            margin-bottom: 16px;
        }
        .theme-switch { position: relative; width: 51px; height: 31px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .theme-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #E5E5EA; transition: .3s; border-radius: 31px;
        }
        .theme-slider:before {
            position: absolute; content: ""; height: 27px; width: 27px;
            left: 2px; bottom: 2px; background-color: white;
            transition: .3s; border-radius: 50%;
        }
        input:checked + .theme-slider { background-color: #34C759; }
        input:checked + .theme-slider:before { transform: translateX(20px); }
        
        .car-section {
            background: var(--bg-secondary); border-radius: 12px; padding: 20px;
            margin-bottom: 16px;
        }
        .car-summary {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; background: var(--bg-primary); border-radius: 10px;
            margin-bottom: 12px;
        }
        .car-summary-color {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid var(--border-color);
        }
        
        .history-detail {
            background: var(--bg-secondary); border-radius: 12px; padding: 16px;
            margin-bottom: 12px;
        }
        .history-detail-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid var(--border-color);
        }
        .history-detail-row {
            display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px;
        }
        .history-detail-label { color: var(--text-secondary); }
        
        .list-item {
            background: var(--bg-secondary); padding: 16px; border-radius: 12px;
            display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
            cursor: pointer;
        }
        .list-icon { font-size: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--bg-primary); border-radius: 50%; }
        .list-info { flex: 1; }
        .list-title { font-size: 16px; font-weight: 600; }
        .list-subtitle { font-size: 13px; color: var(--text-secondary); }
        
        .counter-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 16px 0; }
        .counter-btn {
            width: 48px; height: 48px; border-radius: 50%;
            border: 1px solid var(--input-border); background: var(--bg-secondary);
            font-size: 24px; font-weight: 600; cursor: pointer;
        }
        .counter-btn.minus { color: #FF3B30; border-color: #FF3B30; }
        .counter-btn.plus { color: #34C759; border-color: #34C759; }
        .counter-value { font-size: 32px; font-weight: 700; min-width: 60px; text-align: center; }
        
        .progress-bar { height: 8px; background: var(--bg-primary); border-radius: 4px; margin: 16px 0; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; }
        
        .drawing-controls {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 900; display: flex; gap: 10px;
        }
        .drawing-controls button {
            padding: 12px 20px; border-radius: 20px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .btn-finish { background: #34C759; color: #fff; }
        .btn-cancel { background: #FF3B30; color: #fff; }
        
        .empty-state, .loading-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .spinner {
            width: 32px; height: 32px; border: 3px solid var(--bg-primary);
            border-top-color: #007AFF; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .badge { display: inline-block; padding: 4px 10px; background: #E5F1FF; color: #007AFF; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .map-hint {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
            border-radius: 20px; font-size: 14px; z-index: 800;
        }
    </style>
</head>
<body>

    <div class="app-header"><div class="app-title">Park<span>Near</span></div></div>
    <div id="map"></div>
    
    <div class="map-type-switcher">
        <button class="map-type-btn active" data-type="yandex#map" onclick="switchMapType(this)">️ Схема</button>
        <button class="map-type-btn" data-type="yandex#satellite" onclick="switchMapType(this)">🛰️ Спутник</button>
        <button class="map-type-btn" data-type="yandex#hybrid" onclick="switchMapType(this)">🌍 Гибрид</button>
    </div>
    
    <button id="geoBtn"><svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg></button>
    <button id="addBtn">+</button>

    <div class="panel" id="panel">
        <div class="panel-header">
            <div class="panel-title" id="panelTitle">Профиль</div>
            <button class="panel-close" onclick="closePanel()">Готово</button>
        </div>
        <div class="panel-content" id="panelContent"></div>
    </div>

    <div class="tabBar">
        <div class="tab active" onclick="showMap()"><div class="icon">🗺️</div><div class="label">Карта</div></div>
        <div class="tab" onclick="showPanel('history')"><div class="icon">🕘</div><div class="label">История</div></div>
        <div class="tab" onclick="showPanel('favorites')"><div class="icon">⭐</div><div class="label">Избранное</div></div>
        <div class="tab" onclick="showPanel('profile')"><div class="icon">👤</div><div class="label">Профиль</div></div>
    </div>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyATLX5t2lmibbuiSXL_sWu_JnFFTb-nMqU",
            authDomain: "parknear-bef41.firebaseapp.com",
            databaseURL: "https://parknear-bef41-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "parknear-bef41",
            storageBucket: "parknear-bef41.firebasestorage.app",
            messagingSenderId: "1066552333578",
            appId: "1:1066552333578:web:e60e333cf877852eba16f3"
        });
        const database = firebase.database();
        
        let map, currentUser = null, mapMarkers = {}, myLocationPlacemark = null;
        let drawingPolygon = null, isDrawingMode = false;
        
        const carBrands = {
            'Audi': ['A3', 'A4', 'A5', 'A6', 'A7', 'A8', 'Q3', 'Q5', 'Q7', 'Q8'],
            'BMW': ['1 Series', '3 Series', '5 Series', '7 Series', 'X1', 'X3', 'X5', 'X6'],
            'Mercedes-Benz': ['A-Class', 'C-Class', 'E-Class', 'S-Class', 'GLA', 'GLC', 'GLE'],
            'Volkswagen': ['Golf', 'Polo', 'Passat', 'Tiguan', 'Touareg'],
            'Toyota': ['Camry', 'Corolla', 'RAV4', 'Land Cruiser', 'Highlander'],
            'Honda': ['Civic', 'Accord', 'CR-V', 'HR-V'],
            'Nissan': ['Altima', 'Sentra', 'Rogue', 'Pathfinder'],
            'Hyundai': ['Solaris', 'Elantra', 'Sonata', 'Tucson', 'Santa Fe'],
            'Kia': ['Rio', 'Ceed', 'Optima', 'Sportage', 'Sorento'],
            'Mazda': ['Mazda3', 'Mazda6', 'CX-5', 'CX-9'],
            'Ford': ['Focus', 'Mondeo', 'Kuga', 'Explorer'],
            'Lada': ['Vesta', 'Granta', 'XRAY', 'Niva'],
            'Renault': ['Logan', 'Sandero', 'Duster', 'Kaptur'],
            'Skoda': ['Octavia', 'Superb', 'Rapid', 'Kodiaq'],
            'Tesla': ['Model S', 'Model 3', 'Model X', 'Model Y'],
            'Другая': ['Другая модель']
        };

        const carColors = {
            'Белый': '#FFFFFF', 'Чёрный': '#000000', 'Серебристый': '#C0C0C0',
            'Серый': '#808080', 'Красный': '#FF0000', 'Синий': '#0000FF',
            'Зелёный': '#008000', 'Жёлтый': '#FFFF00', 'Оранжевый': '#FFA500',
            'Коричневый': '#8B4513', 'Бежевый': '#F5F5DC', 'Другой': '#808080'
        };

        function initAuth() {
            if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
                const user = window.Telegram.WebApp.initDataUnsafe.user;
                currentUser = {
                    id: 'tg_' + user.id,
                    username: user.username || 'tg_user',
                    firstName: user.first_name || 'Пользователь',
                    photoUrl: user.photo_url || ''
                };
                localStorage.setItem('tgUser', JSON.stringify(currentUser));
            } else if (!currentUser) {
                const saved = localStorage.getItem('tgUser');
                if (saved) currentUser = JSON.parse(saved);
            }
            
            if (localStorage.getItem('darkTheme') === 'true') {
                document.body.classList.add('dark-theme');
            }
            
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        }

        function getDistanceInMeters(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function switchMapType(btn) {
            if (!map) return;
            const type = btn.dataset.type;
            map.setType(type);
            document.querySelectorAll('.map-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const mapEl = document.getElementById('map');
            mapEl.style.filter = (type === 'yandex#map' && document.body.classList.contains('dark-theme')) 
                ? 'invert(0.82) hue-rotate(180deg) brightness(0.95) contrast(0.9) saturate(0.85)' 
                : 'none';
        }

        function toggleDrawingMode() {
            if (!currentUser) { showPanel('profile'); return; }
            isDrawingMode ? cancelDrawing() : startDrawingMode();
        }

        function startDrawingMode() {
            isDrawingMode = true;
            document.getElementById('addBtn').classList.add('drawing');
            document.getElementById('addBtn').textContent = '✕';
            
            drawingPolygon = new ymaps.Polygon([[]], {}, {
                editorDrawingCursor: "crosshair",
                fillColor: '#007AFF22', strokeColor: '#007AFF', strokeWidth: 3
            });
            
            map.geoObjects.add(drawingPolygon);
            drawingPolygon.editor.startDrawing();
            
            const controls = document.createElement('div');
            controls.className = 'drawing-controls';
            controls.id = 'drawingControls';
            controls.innerHTML = `
                <button class="btn-finish" onclick="finishDrawing()">✓ Завершить</button>
                <button class="btn-cancel" onclick="cancelDrawing()">✕ Отмена</button>
            `;
            document.body.appendChild(controls);
        }

        function finishDrawing() {
            if (!drawingPolygon) return;
            drawingPolygon.editor.stopDrawing();
            const coordinates = drawingPolygon.geometry.getCoordinates()[0];
            
            const lats = coordinates.map(c => c[0]);
            const lngs = coordinates.map(c => c[1]);
            const widthM = getDistanceInMeters(Math.min(...lats), Math.min(...lngs), Math.min(...lats), Math.max(...lngs));
            const lengthM = getDistanceInMeters(Math.min(...lats), Math.min(...lngs), Math.max(...lats), Math.min(...lngs));
            
            if (widthM > 100 || lengthM > 100) {
                alert(`Зона слишком большая! Максимум 100×100м. Сейчас: ${Math.round(widthM)}×${Math.round(lengthM)}м`);
                cancelDrawing();
                return;
            }
            
            document.getElementById('drawingControls')?.remove();
            document.getElementById('addBtn').classList.remove('drawing');
            document.getElementById('addBtn').textContent = '+';
            isDrawingMode = false;
            
            document.getElementById('panel').classList.add('active');
            document.getElementById('panelTitle').textContent = 'Новая парковка';
            document.getElementById('panelContent').innerHTML = `
                <div class="input-field" style="background:var(--bg-primary); color:var(--text-secondary);">${Math.round(widthM)}м × ${Math.round(lengthM)}м</div>
                <input type="number" id="parkSpots" class="input-field" placeholder="Количество мест" min="1" max="500">
                <input type="text" id="parkName" class="input-field" placeholder="Название">
                <textarea id="parkDesc" class="input-field" rows="3" placeholder="Описание"></textarea>
                <button class="btn-primary" onclick="submitParking()">Сохранить</button>
                <button class="btn-secondary" onclick="cancelDrawing(); closePanel();">Отмена</button>
            `;
        }

        function cancelDrawing() {
            if (drawingPolygon) {
                map.geoObjects.remove(drawingPolygon);
                drawingPolygon = null;
            }
            isDrawingMode = false;
            document.getElementById('addBtn').classList.remove('drawing');
            document.getElementById('addBtn').textContent = '+';
            document.getElementById('drawingControls')?.remove();
        }

        function submitParking() {
            const name = document.getElementById('parkName').value.trim();
            const desc = document.getElementById('parkDesc').value.trim();
            const totalSpots = parseInt(document.getElementById('parkSpots').value);
            
            if (!name || !totalSpots || !drawingPolygon) {
                alert('Заполните все поля');
                return;
            }

            const coordinates = drawingPolygon.geometry.getCoordinates()[0].map(c => [parseFloat(c[0]), parseFloat(c[1])]);
            const centerLat = coordinates.reduce((sum, c) => sum + c[0], 0) / coordinates.length;
            const centerLng = coordinates.reduce((sum, c) => sum + c[1], 0) / coordinates.length;

            const parkingData = {
                lat: centerLat, lng: centerLng, coordinates,
                totalSpots, occupiedSpots: 0, name, desc,
                authorId: currentUser.id, authorName: currentUser.firstName,
                authorUsername: currentUser.username, timestamp: Date.now()
            };

            const btn = event.target;
            btn.textContent = 'Сохранение...';
            btn.disabled = true;

            const newRef = database.ref('parkings').push();
            newRef.set(parkingData)
                .then(() => database.ref(`parkings/${newRef.key}/history`).push({
                    action: 'created', timestamp: Date.now(),
                    userId: currentUser.id, username: currentUser.username
                }))
                .then(() => {
                    addMarkerToMap(newRef.key, parkingData);
                    cancelDrawing();
                    closePanel();
                })
                .catch(err => {
                    alert('Ошибка: ' + err.message);
                    btn.textContent = 'Сохранить';
                    btn.disabled = false;
                });
        }

        // ✅ ИСПРАВЛЕННАЯ ФУНКЦИЯ ЗАГРУЗКИ ПАРКОВОК
        function loadAllParkings() {
            console.log('🔄 Начинаю загрузку парковок...');
            if (!map) {
                console.error('❌ Карта не готова к загрузке!');
                return;
            }
            
            database.ref('parkings').once('value')
                .then(snapshot => {
                    const data = snapshot.val();
                    console.log('📦 Получено данных:', snapshot.numChildren());
                    
                    if (!data) {
                        console.log('ℹ️ База данных пуста');
                        return;
                    }
                    
                    let loadedCount = 0;
                    Object.keys(data).forEach(key => {
                        const p = data[key];
                        
                        // Проверяем наличие обязательных полей
                        if (p && typeof p.lat === 'number' && typeof p.lng === 'number') {
                            try {
                                addMarkerToMap(key, p);
                                loadedCount++;
                            } catch (e) {
                                console.warn(`️ Ошибка добавления маркера ${key}:`, e);
                            }
                        } else {
                            console.warn(`⚠️ Пропущена запись ${key}: неверные координаты`, p);
                        }
                    });
                    
                    console.log(`✅ Успешно загружено ${loadedCount} парковок`);
                })
                .catch(err => {
                    console.error("❌ Критическая ошибка загрузки:", err);
                });
        }

        function getOccupancyColor(occupied, total) {
            const ratio = occupied / total;
            return ratio < 0.5 ? '#34C759' : ratio < 0.8 ? '#FF9500' : '#FF3B30';
        }

        function formatDateTime(timestamp) {
            if (!timestamp) return 'Неизвестно';
            const d = new Date(timestamp);
            return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        }

        function getParkingBalloonContent(parkingId, data) {
            const { totalSpots = 0, occupiedSpots = 0, name } = data;
            const freeSpots = totalSpots - occupiedSpots;
            const color = getOccupancyColor(occupiedSpots, totalSpots);
            const percent = totalSpots > 0 ? Math.round((occupiedSpots / totalSpots) * 100) : 0;
            const isAuthor = currentUser?.id === data.authorId;
            
            return `
                <div class="parking-balloon">
                    <div class="parking-balloon-title">${name}</div>
                    <div class="parking-balloon-stats">
                        <div class="parking-balloon-stat"><div class="parking-balloon-stat-value" style="color:#34C759">${freeSpots}</div><div class="parking-balloon-stat-label">Свободно</div></div>
                        <div class="parking-balloon-stat"><div class="parking-balloon-stat-value" style="color:#FF3B30">${occupiedSpots}</div><div class="parking-balloon-stat-label">Занято</div></div>
                        <div class="parking-balloon-stat"><div class="parking-balloon-stat-value" style="color:#007AFF">${totalSpots}</div><div class="parking-balloon-stat-label">Всего</div></div>
                    </div>
                    <div class="parking-balloon-progress-bar"><div class="parking-balloon-progress-fill" style="width:${percent}%;background:${color}"></div></div>
                    <div class="parking-balloon-progress-text">Загруженность: ${percent}%</div>
                    ${isAuthor ? `
                        <div class="parking-balloon-buttons">
                            <button class="btn-balloon-edit" onclick="openOccupancyPanel('${parkingId}', event)">️ Редактировать</button>
                            <button class="btn-balloon-delete" onclick="deleteParking('${parkingId}', event)"> Удалить</button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // ✅ ИСПРАВЛЕННАЯ ФУНКЦИЯ ДОБАВЛЕНИЯ МАРКЕРА
        function addMarkerToMap(id, data) {
            if (!map) {
                console.error('❌ Карта не инициализирована для маркера', id);
                return;
            }
            
            if (mapMarkers[id]) {
                console.log(`ℹ️ Маркер ${id} уже существует`);
                return;
            }
            
            const { totalSpots = 0, occupiedSpots = 0, name, lat, lng, coordinates } = data;
            const freeSpots = totalSpots - occupiedSpots;
            const color = getOccupancyColor(occupiedSpots, totalSpots);
            
            let placemark;
            
            // Безопасная проверка координат полигона
            const hasValidPolygon = Array.isArray(coordinates) && coordinates.length >= 3 && 
                                   coordinates.every(coord => Array.isArray(coord) && coord.length === 2);
            
            try {
                if (hasValidPolygon) {
                    placemark = new ymaps.Polygon([coordinates], {
                        hintContent: `${name} (${freeSpots} св.)`
                    }, { fillColor: color + '33', strokeColor: color, strokeWidth: 2 });
                } else {
                    // Fallback на обычную метку если полигон поврежден
                    placemark = new ymaps.Placemark([lat, lng], {
                        hintContent: `${name} (${freeSpots} св.)`
                    }, { preset: 'islands#blueParkingIcon' });
                }
                
                placemark.balloon.setContent(getParkingBalloonContent(id, data));
                placemark.events.add('click', () => {
                    placemark.balloon.setContent(getParkingBalloonContent(id, data));
                    placemark.balloon.open();
                });
                
                map.geoObjects.add(placemark);
                mapMarkers[id] = placemark;
                
            } catch (error) {
                console.error(` Критическая ошибка маркера ${id}:`, error);
            }
        }

        function openOccupancyPanel(parkingId, event) {
            event?.stopPropagation();
            database.ref(`parkings/${parkingId}`).once('value').then(snapshot => {
                const data = snapshot.val();
                if (!data) return;
                
                const { totalSpots = 0, occupiedSpots = 0, name, desc } = data;
                const freeSpots = totalSpots - occupiedSpots;
                const color = getOccupancyColor(occupiedSpots, totalSpots);
                const percent = totalSpots > 0 ? Math.round((occupiedSpots / totalSpots) * 100) : 0;
                const isAuthor = currentUser?.id === data.authorId;
                
                document.getElementById('panel').classList.add('active');
                document.getElementById('panelTitle').textContent = 'Парковка';
                document.getElementById('panelContent').innerHTML = `
                    <div style="text-align:center;padding:10px 0 20px;">
                        <div style="font-size:20px;font-weight:700;">${name}</div>
                        <div style="font-size:14px;color:var(--text-secondary);">${desc || 'Нет описания'}</div>
                    </div>
                    <div style="display:flex;gap:12px;margin-bottom:20px;">
                        <div class="stat-card"><div class="stat-value" style="color:#007AFF">${totalSpots}</div><div class="stat-label">Всего</div></div>
                        <div class="stat-card"><div class="stat-value" style="color:#34C759">${freeSpots}</div><div class="stat-label">Свободно</div></div>
                        <div class="stat-card"><div class="stat-value" style="color:#FF3B30">${occupiedSpots}</div><div class="stat-label">Занято</div></div>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;background:${color}"></div></div>
                    <div style="text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:20px;">Загруженность: ${percent}%</div>
                    <div style="text-align:center;margin-bottom:12px;font-weight:600;">Изменить занятые места:</div>
                    <div class="counter-row">
                        <button class="counter-btn minus" onclick="changeOccupancy('${parkingId}', ${totalSpots}, ${occupiedSpots}, -1)">−</button>
                        <div class="counter-value" id="currentOccupied">${occupiedSpots}</div>
                        <button class="counter-btn plus" onclick="changeOccupancy('${parkingId}', ${totalSpots}, ${occupiedSpots}, 1)">+</button>
                    </div>
                    ${isAuthor ? `<button class="btn-danger" style="margin-top:20px;" onclick="deleteParking('${parkingId}')"> Удалить</button>` : ''}
                    <button class="btn-secondary" style="margin-top:20px;" onclick="closePanel()">Закрыть</button>
                `;
            });
        }

        function deleteParking(parkingId, event) {
            event?.stopPropagation();
            if (!confirm('Удалить парковку?')) return;
            
            database.ref(`parkings/${parkingId}`).remove().then(() => {
                if (mapMarkers[parkingId]) {
                    map.geoObjects.remove(mapMarkers[parkingId]);
                    delete mapMarkers[parkingId];
                }
                closePanel();
            }).catch(err => alert('Ошибка: ' + err.message));
        }

        function changeOccupancy(parkingId, totalSpots, currentOccupied, delta) {
            const newOccupied = currentOccupied + delta;
            if (newOccupied < 0 || newOccupied > totalSpots) return;
            
            database.ref(`users/${currentUser.id}/car`).once('value').then(carSnapshot => {
                const carData = carSnapshot.val() || {};
                
                database.ref(`parkings/${parkingId}/occupiedSpots`).set(newOccupied)
                    .then(() => database.ref(`parkings/${parkingId}/history`).push({
                        action: delta < 0 ? 'freed' : 'occupied',
                        timestamp: Date.now(),
                        userId: currentUser.id, username: currentUser.username,
                        carBrand: carData.brand || '', carModel: carData.model || '',
                        carPlate: carData.plate || '',
                        previousOccupied: currentOccupied, newOccupied
                    }))
                    .then(() => {
                        document.getElementById('currentOccupied').textContent = newOccupied;
                        database.ref(`parkings/${parkingId}`).once('value').then(snapshot => {
                            const data = snapshot.val();
                            if (mapMarkers[parkingId]) {
                                map.geoObjects.remove(mapMarkers[parkingId]);
                                delete mapMarkers[parkingId];
                            }
                            addMarkerToMap(parkingId, data);
                        });
                        openOccupancyPanel(parkingId);
                    });
            });
        }

        function getUserLocation() {
            return new Promise((resolve, reject) => {
                if (window.Telegram?.WebApp?.Geolocation) {
                    window.Telegram.WebApp.Geolocation.getLocation()
                        .then(loc => resolve({ lat: loc.latitude, lng: loc.longitude }))
                        .catch(() => tryBrowserGeolocation(resolve, reject));
                } else {
                    tryBrowserGeolocation(resolve, reject);
                }
            });
        }

        function tryBrowserGeolocation(resolve, reject) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    reject,
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                reject(new Error('Геолокация не поддерживается'));
            }
        }

        function initMap() {
            map = new ymaps.Map("map", {
                center: [55.7558, 37.6173], zoom: 14,
                controls: ['zoomControl'], type: 'yandex#map'
            });
            
            document.getElementById('addBtn').onclick = toggleDrawingMode;
            
            document.getElementById('geoBtn').onclick = function() {
                const btn = this;
                btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>';
                
                getUserLocation().then(coords => {
                    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>';
                    
                    if (myLocationPlacemark) map.geoObjects.remove(myLocationPlacemark);
                    myLocationPlacemark = new ymaps.Placemark([coords.lat, coords.lng], {
                        hintContent: 'Вы здесь'
                    }, { preset: 'islands#blueCircleDotIconWithCaption' });
                    map.geoObjects.add(myLocationPlacemark);
                    map.setCenter([coords.lat, coords.lng], 16, { duration: 500 });
                }).catch(err => {
                    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>';
                    alert('Не удалось определить местоположение');
                });
            };

            // ✅ УВЕЛИЧЕНА ЗАДЕРЖКА ДЛЯ НАДЕЖНОЙ ЗАГРУЗКИ
            setTimeout(() => {
                loadAllParkings();
                getUserLocation().then(coords => {
                    if (myLocationPlacemark) map.geoObjects.remove(myLocationPlacemark);
                    myLocationPlacemark = new ymaps.Placemark([coords.lat, coords.lng], {
                        hintContent: 'Вы здесь'
                    }, { preset: 'islands#blueCircleDotIconWithCaption' });
                    map.geoObjects.add(myLocationPlacemark);
                    map.setCenter([coords.lat, coords.lng], 14, { duration: 500 });
                }).catch(() => {});
            }, 1000); // Увеличено с 500 до 1000 мс
        }
        
        if (typeof ymaps !== 'undefined') {
            ymaps.ready(() => { initAuth(); initMap(); });
        } else {
            window.addEventListener('load', () => ymaps.ready(() => { initAuth(); initMap(); }));
        }

        function showPanel(type) {
            document.getElementById('panel').classList.add('active');
            document.getElementById('panelTitle').textContent = 
                type === 'profile' ? 'Профиль' : type === 'history' ? 'История' : 'Избранное';
            
            const content = document.getElementById('panelContent');

            if (type === 'profile') {
                renderProfile(content);
            } else if (type === 'history' || type === 'favorites') {
                content.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Загрузка...</p></div>';
                loadUserData(type, content);
            }
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const tabIndex = type === 'profile' ? 3 : type === 'history' ? 1 : 2;
            document.querySelectorAll('.tab')[tabIndex].classList.add('active');
        }

                const carData = snapshot.val() || {};
                const { brand, model, plate, color } = carData;
                
                const form = document.createElement('div');
                form.className = 'car-section';
                form.id = 'carEditSection';

                    <div style="font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;"> Редактирование</div>

        function saveCarData() {
            const brand = document.getElementById('carBrand').value;
            const model = document.getElementById('carModel').value;
            const color = document.getElementById('carColor').value;
            const plate = document.getElementById('carPlate').value.trim();
            
            if (!brand || !model || !color || !plate) {
                alert('Заполните все поля');

            database.ref(`users/${currentUser.id}/car`).set({
                brand, model, color, plate: plate.toUpperCase(), timestamp: Date.now()
            }).then(() => renderProfile(document.getElementById('panelContent')))
              .catch(err => alert('Ошибка: ' + err.message));

        function showParkingHistory(parkingId, parkingName) {
            document.getElementById('panelTitle').textContent = parkingName;
            
            database.ref(`parkings/${parkingId}/history`).once('value').then(snapshot => {
                const data = snapshot.val();
                if (!data) {
                    document.getElementById('panelContent').innerHTML = `
                        <div class="empty-state"><div style="font-size:48px;">🕘</div><p>История пуста</p></div>
                        <button class="btn-secondary" onclick="showPanel('history')">Назад</button>
                    `;
                    return;
                }
                
                let html = '<div class="list-container">';
                Object.values(data).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)).forEach(item => {
                    const actionText = item.action === 'freed' ? '🟢 Освобождено' : 
                                      item.action === 'occupied' ? ' Занято' : ' Создано';
                    
                    html += `
                        <div class="history-detail">
                            <div class="history-detail-header">
                                <div style="font-size:15px;font-weight:600;">${actionText}</div>
                                <div style="font-size:12px;color:var(--text-secondary);">${formatDateTime(item.timestamp)}</div>
                            </div>
                            ${item.username ? `<div class="history-detail-row"><span class="history-detail-label">Пользователь:</span><span>@${item.username}</span></div>` : ''}
                            ${item.carBrand ? `<div class="history-detail-row"><span class="history-detail-label">Авто:</span><span>${item.carBrand} ${item.carModel || ''} ${item.carPlate ? '(' + item.carPlate + ')' : ''}</span></div>` : ''}
                            ${item.previousOccupied !== undefined ? `<div class="history-detail-row"><span class="history-detail-label">Изменение:</span><span>${item.previousOccupied} → ${item.newOccupied}</span></div>` : ''}
                        </div>
                    `;
                });
                
                document.getElementById('panelContent').innerHTML = html + '</div><button class="btn-secondary" onclick="showPanel(\'history\')">Назад</button>';
            });
        }

        function focusMap(lat, lng, parkingId) {
            closePanel();
            map.setCenter([lat, lng], 16, { duration: 300 });
            if (mapMarkers[parkingId]) {
                setTimeout(() => mapMarkers[parkingId].balloon.open(), 400);
            }
        }

        function closePanel() { 
            document.getElementById('panel').classList.remove('active'); 
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.tab:first-child').classList.add('active');
        }
        
        function showMap() { closePanel(); }

        function continueAsGuest() {
            currentUser = { id: 'guest_' + Date.now(), username: 'guest', firstName: 'Гость', photoUrl: '' };
            localStorage.setItem('tgUser', JSON.stringify(currentUser));
            showPanel('profile');
        }

        function logout() {
            if (confirm('Выйти из аккаунта?')) {
                currentUser = null;
                localStorage.removeItem('tgUser');
                showPanel('profile');
            }
        }
    </script>
</body>
</html>
